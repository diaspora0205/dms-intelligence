<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diaspora Mondial Santé</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen">
    <header class="bg-blue-900 p-4 shadow-xl border-b border-blue-400">
        <h1 class="text-xl font-bold text-center">Diaspora Mondial Santé</h1>
    </header>

    <div id="chat-container" class="p-4 space-y-4 overflow-y-auto" style="height: 70vh;">
        <div class="bg-gray-800 p-3 rounded-lg border-l-4 border-yellow-400">
            Bonjour Directeur Kourouma. Je suis prêt. Posez votre question.
        </div>
    </div>

    <form id="chat-form" class="fixed bottom-0 w-full p-4 bg-gray-900 flex gap-2">
        <input type="text" id="msg-input" placeholder="Votre question..." class="flex-grow p-3 rounded bg-gray-800 border border-gray-600">
        <button type="submit" class="bg-blue-600 p-3 rounded font-bold">OK</button>
    </form>

    <script>
    const f = document.getElementById('chat-form');
    const c = document.getElementById('chat-container');
    const i = document.getElementById('msg-input');
    const p1 = "sk-or-v1-8848480396495589c379a041f02";
    const p2 = "1e90956f6f9660c238b1b0179d63c4e365022";

    f.onsubmit = async (e) => {
        e.preventDefault();
        const text = i.value.trim();
        if(!text) return;

        // Afficher message
        c.innerHTML += `<div class="text-right"><span class="bg-blue-600 p-2 rounded inline-block">${text}</span></div>`;
        const loader = document.createElement('div');
        loader.innerHTML = "Analyse en cours...";
        c.appendChild(loader);
        i.value = '';

        try {
            const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + p1 + p2, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: 'google/gemini-2.0-flash-001',
                    messages: [{role:'system', content:'Tu es Diaspora Mondial Santé, expert de Moustapha Kourouma.'},{role:'user', content:text}]
                })
            });
            const data = await res.json();
            loader.remove();
            c.innerHTML += `<div class="bg-gray-800 p-3 rounded border-l-4 border-blue-500">${data.choices[0].message.content}</div>`;
        } catch (err) {
            loader.innerHTML = "Erreur. Verifiez votre connexion.";
        }
        c.scrollTop = c.scrollHeight;
    };
    </script>
</body>
