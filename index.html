<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMS Intelligence - Officiel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .chat-container { height: 65vh; overflow-y: auto; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <header class="p-4 glass shadow-2xl flex items-center justify-between border-b border-blue-500/30">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-full shadow-lg"><i class="fas fa-lion text-2xl text-white"></i></div>
            <div>
                <h1 class="font-bold text-xl tracking-wide">DMS <span class="text-blue-400">INTELLIGENCE</span></h1>
                <p class="text-[10px] text-blue-300 uppercase tracking-widest font-semibold">Diaspora Mondial Santé</p>
            </div>
        </div>
        <div class="flex items-center gap-2"><span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span><span class="text-xs font-mono uppercase">Activé</span></div>
    </header>

    <main class="flex-grow p-4 chat-container" id="chatBox">
        <div class="mb-4 flex justify-start">
            <div class="glass p-3 rounded-2xl rounded-tl-none max-w-[85%] border-l-4 border-blue-500">
                <p class="text-sm italic">"Bienvenue Monsieur le Directeur Moustapha. Le moteur DMS Intelligence est en ligne."</p>
            </div>
        </div>
    </main>

    <footer class="p-4 glass border-t border-blue-500/30">
        <div class="flex gap-2 max-w-4xl mx-auto">
            <input type="text" id="userInput" placeholder="Posez votre question..." class="flex-grow bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500">
            <button onclick="sendMessage()" class="bg-blue-600 p-4 rounded-xl shadow-lg"><i class="fas fa-paper-plane"></i></button>
        </div>
    </footer>

    <script>
        const API_KEY = "AIzaSyBSxMK_1YG5238zDhjoGKNXYDmcWn8_qYI"; 
        const IDENTITY = "Tu es DMS Intelligence, l'IA officielle de Diaspora Mondial Santé (DMS), créée par le Directeur Moustapha Kourouma.";

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            if (!input.value.trim()) return;

            const userText = input.value;
            chatBox.innerHTML += `<div class="mb-4 flex justify-end"><div class="bg-blue-600 p-3 rounded-2xl text-sm">${userText}</div></div>`;
            input.value = '';

            try {
                const response = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: IDENTITY + " Réponds à : " + userText }] }] })
                });
                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                chatBox.innerHTML += `<div class="mb-4 flex justify-start"><div class="glass p-3 rounded-2xl border-l-4 border-blue-400 text-sm">${aiResponse}</div></div>`;
            } catch (e) {
                chatBox.innerHTML += `<div class="text-red-400 text-[10px] text-center my-2">Connexion en cours... Réessayez.</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>                                         </html>
