<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMS EXPERT IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-950 text-white font-sans min-h-screen flex flex-col">

    <header class="p-4 bg-slate-900 border-b border-blue-500/50 flex justify-between items-center shadow-2xl">
        <div class="flex items-center gap-2">
            <i class="fas fa-lion text-yellow-500 text-2xl"></i>
            <h1 class="font-bold text-lg tracking-tight uppercase">DIASPORA MONDIAL SANTÉ</h1>
        </div>
        <div class="text-[10px] bg-green-900/50 text-green-400 px-2 py-1 rounded border border-green-500/50">CONNECTÉ</div>
    </header>

    <div id="chat-box" class="flex-grow p-4 overflow-y-auto space-y-4" style="height: 70vh;">
        <div class="bg-slate-800 p-4 rounded-lg border border-slate-700 max-w-[90%]">
            <p class="text-sm">Système prêt. Bonjour Directeur Kourouma. Posez votre question ici.</p>
        </div>
    </div>

    <footer class="p-4 bg-slate-900 border-t border-slate-800">
        <form id="chat-form" class="flex gap-2">
            <input type="text" id="user-input" placeholder="Votre question ici..." class="flex-grow bg-black border border-slate-700 p-3 rounded-lg text-white outline-none">
            <button type="submit" class="bg-blue-600 px-6 rounded-lg"><i class="fas fa-paper-plane"></i></button>
        </form>
    </footer>

    <script>
        const form = document.getElementById('chat-form');
        const box = document.getElementById('chat-box');
        const input = document.getElementById('user-input');

        // LA CLÉ (VERSION SÉCURISÉE SANS COUPURE)
        const key = "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";

        form.onsubmit = async (e) => {
            e.preventDefault();
            const msg = input.value.trim();
            if(!msg) return;

            // Afficher message utilisateur
            box.innerHTML += `<div class="flex justify-end"><div class="bg-blue-700 p-3 rounded-lg max-w-[85%] text-sm">${msg}</div></div>`;
            
            const loader = document.createElement('div');
            loader.className = "text-blue-400 text-xs italic animate-pulse";
            loader.innerText = "Le Lion réfléchit...";
            box.appendChild(loader);
            input.value = '';
            box.scrollTop = box.scrollHeight;

            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer " + key,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "google/gemini-2.0-flash-001",
                        messages: [{ role: "user", content: msg }]
                    })
                });

                const data = await res.json();
                loader.remove();

                if (data.choices && data.choices[0]) {
                    const reply = data.choices[0].message.content;
                    box.innerHTML += `<div class="flex justify-start"><div class="bg-slate-800 p-3 rounded-lg border-l-4 border-blue-500 max-w-[85%] text-sm">${reply}</div></div>`;
                } else {
                    box.innerHTML += `<div class="text-red-500 text-xs">Erreur de réponse de Google.</div>`;
                }
            } catch (err) {
                loader.innerText = "Erreur de connexion. Vérifiez internet.";
            }
            box.scrollTop = box.scrollHeight;
        };
    </script>
</body>
</html>
