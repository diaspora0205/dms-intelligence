        function ask() {
            let inputField = document.getElementById('userInput');
            let input = inputField.value.toLowerCase().trim();
            let out = document.getElementById('res');
            let wel = document.getElementById('wel');
            if(input.length < 2) return;
            
            let found = false;
            for(let item of database){
                for(let key of item.k){
                    if(input.includes(key)){
                        out.innerHTML = "<span style='color:var(--gold)'>ANALYSE DMS RÉUSSIE :</span><br><br>" + item.r;
                        found = true; break;
                    }
                }
                if(found) break;
            }

            if(!found) {
                out.innerHTML = "<span style='color:red'>ANALYSE DMS :</span> Ce cas est trop spécifique. Cliquez sur le bouton WhatsApp pour parler au Directeur.";
            }
            out.style.display = "block";
            wel.style.display = "none";
