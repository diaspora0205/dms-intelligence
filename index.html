<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMS - Expert Google Cloud Top 24</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f4; margin: 0; padding: 0; text-align: center; }
        .header { background: #004d40; color: white; padding: 20px; border-bottom: 5px solid #ffcc00; }
        .badges { display: flex; justify-content: center; gap: 15px; margin-top: 10px; flex-wrap: wrap; }
        .badge { background: white; color: #333; padding: 5px 15px; border-radius: 20px; font-weight: bold; border: 2px solid #ffcc00; font-size: 0.9em; }
        
        /* Moteur de Recherche */
        .search-container { background: white; margin: 20px auto; padding: 30px; border-radius: 15px; width: 80%; max-width: 600px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .search-box { display: flex; background: #eee; border-radius: 30px; padding: 10px 20px; align-items: center; border: 2px solid #004d40; }
        .search-box input { border: none; background: transparent; flex: 1; outline: none; font-size: 1.1em; padding: 5px; }
        .btn-avion { background: #004d40; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; transition: 0.3s; }
        .btn-avion:hover { background: #ffcc00; color: #004d40; transform: scale(1.1); }
        
        /* Résultats */
        #resultat { margin-top: 20px; padding: 20px; border-radius: 10px; display: none; text-align: left; background: #e0f2f1; border-left: 5px solid #004d40; }
        
        /* Gadgets */
        .gadgets { display: flex; justify-content: space-around; background: #333; color: white; padding: 10px; font-size: 0.8em; }
        .whatsapp-btn { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 15px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1000; }
        #google_translate_element { margin: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1>DIASPORA MONDIAL SANTÉ (DMS)</h1>
    <p>Directeur : <strong>Mustapha Kourouma</strong></p>
    <div class="badges">
        <span class="badge">🥉 Bronze: 2e Place</span>
        <span class="badge">🥈 Argent: 3e Place</span>
        <span class="badge">🥇 Or: 24e Mondial (Google Cloud Expert)</span>
    </div>
</div>

<div id="google_translate_element"></div>

<div class="gadgets">
    <div id="clock">Chargement heure...</div>
    <div>Visiteurs : <span id="visitor-count">2500</span></div>
</div>

<div class="search-container">
    <h3>IA de Diagnostic Intégrée</h3>
    <p>Entrez une pathologie (ex: Diabète, Tension, Paludisme...)</p>
    <div class="search-box">
        <input type="text" id="userInput" placeholder="Quelle solution cherchez-vous ?">
        <button class="btn-avion" onclick="lancerAnalyse()"><i class="fas fa-paper-plane"></i></button>
    </div>
    
    <div id="resultat"></div>
</div>

<a href="https://wa.me/VOTRE_NUMERO" class="whatsapp-btn">
    <i class="fab fa-whatsapp"></i> WhatsApp Directeur
</a>

<script>
    // 1. Horloge Temps Réel
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleString('fr-FR');
    }
    setInterval(updateClock, 1000);

    // 2. Compteur de Visiteurs (Simulé à partir de 2500)
    let count = 2500;
    setInterval(() => {
        count += Math.floor(Math.random() * 3);
        document.getElementById('visitor-count').innerText = count;
    }, 10000);

    // 3. Moteur de Recherche IA DMS
    const solutions = {
        "diabete": "Analyse IA : Régulation glycémique requise. Solution DMS : Infusion de feuilles de Moringa et racines de pays 1 (Sénégal/Mali). Consultez le protocole d'Expert Google Cloud.",
        "tension": "Analyse IA : Hypertension détectée. Solution DMS : Ail noir fermenté et infusion d'Hibiscus (Bissap) sans sucre. Suivi cardiaque recommandé.",
        "paludisme": "Analyse IA : Infection parasitaire. Solution DMS : Artémisia en tisane et décoction de feuilles de Neem. Repos total.",
        "maux de tete": "Analyse IA : Fatigue ou déshydratation. Solution DMS : Hydratation avec eau citronnée et massage aux huiles essentielles de menthe."
    };

    function lancerAnalyse() {
        const input = document.getElementById('userInput').value.toLowerCase();
        const resDiv = document.getElementById('resultat');
        resDiv.style.display = "block";
        resDiv.innerHTML = "<strong>Analyse IA en cours...</strong>";

        setTimeout(() => {
            let found = false;
            for (let maladie in solutions) {
                if (input.includes(maladie)) {
                    resDiv.innerHTML = `<strong>RÉSULTAT EXPERT DMS :</strong><br><br>${solutions[maladie]}<br><br><small>Certifié par l'Expert Top 24 Google Cloud : Mustapha Kourouma</small>`;
                    found = true;
                    break;
                }
            }
            if (!found) {
                resDiv.innerHTML = "<strong>Analyse IA :</strong> Pathologie complexe. Veuillez contacter le Directeur via WhatsApp pour une solution personnalisée de médecine intégrée.";
            }
        }, 1500);
    }

    // 4. Intégration Google Traducteur
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({pageLanguage: 'fr'}, 'google_translate_element');
    }
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
    </html>
