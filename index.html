<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMS | Expert Intelligence Artificielle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
        .chat-height { height: calc(100vh - 180px); }
        body { background: #020617; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col font-sans">

    <header class="glass sticky top-0 z-50 border-b border-blue-500/30 p-4 shadow-2xl">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg shadow-lg">
                    <i class="fas fa-lion text-2xl text-yellow-400"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black uppercase">DIASPORA MONDIAL SANTÉ</h1>
                    <p class="text-[10px] text-blue-400 font-bold tracking-widest uppercase italic">Expertise IA de Pointe</p>
                </div>
            </div>
            <div class="bg-slate-800/80 px-3 py-1 rounded-full border border-green-500/50 flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-[9px] font-bold text-green-400 uppercase">Google Gemini Connecté</span>
            </div>
        </div>
    </header>

    <main id="chat-box" class="chat-height container mx-auto p-4 overflow-y-auto space-y-4">
        <div class="flex justify-start">
            <div class="bg-slate-800 p-4 rounded-2xl rounded-tl-none border border-slate-700 shadow-xl max-w-[85%]">
                <p class="text-blue-400 font-bold text-[10px] mb-2 uppercase italic tracking-widest">Système Opérationnel</p>
                <p class="text-sm">Bonjour Monsieur le Directeur **Moustapha Kourouma**. Le moteur Google Gemini 2.0 est activé. Posez-moi une question sur la santé ou la pharmacopée.</p>
            </div>
        </div>
    </main>

    <footer class="p-4 glass border-t border-slate-800 sticky bottom-0">
        <form id="chat-form" class="container mx-auto flex gap-2">
            <input type="text" id="chat-input" placeholder="Posez votre question à l'expert..." 
                class="flex-grow bg-slate-900 border border-slate-700 p-4 rounded-xl text-white focus:outline-none focus:border-blue-500">
            <button type="submit" class="bg-blue-600 w-14 h-14 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                <i class="fas fa-paper-plane"></i>
            </button>
        </form>
    </footer>

    <script>
        const form = document.getElementById('chat-form');
        const box = document.getElementById('chat-box');
        const input = document.getElementById('chat-input');

        // CLÉ RECTIFIÉE ET COMPLÈTE
        const k = "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";

        form.onsubmit = async (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if(!text) return;

            box.innerHTML += `<div class="flex justify-end mb-4"><div class="bg-blue-700 p-4 rounded-2xl rounded-tr-none shadow-lg max-w-[85%] border-b-2 border-blue-400 text-sm">${text}</div></div>`;
            
            const loader = document.createElement('div');
            loader.className = "flex justify-start mb-4";
            loader.innerHTML = `<div class="bg-slate-800 p-3 rounded-xl border border-blue-500/30 animate-pulse text-xs text-blue-300 italic">Analyse en cours par DMS Expert...</div>`;
            box.appendChild(loader);
            input.value = '';
            box.scrollTop = box.scrollHeight;

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + k,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'google/gemini-2.0-flash-001',
                        messages: [
                            {role:'system', content:'Tu es Diaspora Mondial Santé, l\'IA experte de Moustapha Kourouma.'},
                            {role:'user', content:text}
                        ]
                    })
                });
                
                const data = await response.json();
                loader.remove();
                
                if(data.choices && data.choices[0]) {
                    const reply = data.choices[0].message.content;
                    box.innerHTML += `
                        <div class="flex justify-start mb-4">
                            <div class="bg-slate-800 p-4 rounded-2xl rounded-tl-none border-l-4 border-blue-500 shadow-xl max-w-[85%]">
                                <p class="text-blue-400 font-bold text-[10px] mb-2 uppercase tracking-tighter">Réponse Diaspora Mondial Santé</p>
                                <div class="text-sm leading-relaxed text-gray-100">${reply}</div>
                            </div>
                        </div>`;
                } else {
                    throw new Error();
                }
            } catch(err) {
                loader.innerHTML = "<span class='text-red-400 text-[10px] uppercase font-bold'>Erreur : Vérifiez votre connexion ou la clé.</span>";
            }
            box.scrollTop = box.scrollHeight;
        };
    </script>
</body>
</html>
