<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA MÉDECINE TRADITIONNELLE - MUSTAPHA KOUROUMA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --dark: #000; --blue: #007bff; --green: #25D366; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; text-align: center; }
        
        .header { background: linear-gradient(180deg, #111, var(--dark)); padding: 40px 20px; border-bottom: 5px solid var(--gold); }
        .titre-expert { font-size: 24px; font-weight: bold; color: var(--gold); text-transform: uppercase; }
        .sous-titre { font-size: 16px; color: #00d4ff; font-weight: bold; margin-bottom: 10px; }

        .container { padding: 20px; max-width: 600px; margin: auto; }
        .card-ia { background: #151515; padding: 30px; border-radius: 25px; border: 1px solid #333; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        
        label { display: block; text-align: left; color: var(--gold); font-weight: bold; margin: 15px 0 5px; }
        input, select, textarea { width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 1rem; margin-bottom: 10px; box-sizing: border-box; background: #fff; color: #000; }
        
        .btn-avion { background: var(--blue); color: white; padding: 20px; border-radius: 50px; width: 100%; font-size: 1.3rem; font-weight: bold; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 15px; transition: 0.3s; }
        .btn-avion:hover { transform: scale(1.02); background: #0056b3; }
        
        /* ZONE DE RÉPONSE IA SUR LA PLATEFORME */
        #reponse-ia { margin-top: 25px; padding: 20px; background: rgba(255, 215, 0, 0.1); border: 2px dashed var(--gold); border-radius: 15px; display: none; text-align: left; line-height: 1.6; animation: slideDown 0.5s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .whatsapp-box { background: var(--green); color: white; padding: 18px; border-radius: 50px; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

    <header>
        <div class="sous-titre">FONDATEUR MÉDECINE TRADITIONNELLE INTÉGRÉE</div>
        <div class="titre-expert">MUSTAPHA KOUROUMA</div>
        <p style="font-size: 14px; margin-top: 10px;">Expert Google Cloud | Top 24 Mondial</p>
    </header>

    <div class="container">
        <div id="google_translate_element" style="margin-bottom: 20px;"></div>

        <div class="card-ia">
            <h2 style="color:var(--gold); margin-top:0;">CONSULTATION IA</h2>
            
            <label>NOM DU PATIENT :</label>
            <input type="text" id="nom_patient" placeholder="Votre nom...">

            <label>CHOISIR LA MALADIE :</label>
            <select id="type_maladie">
                <option value="">-- Sélectionnez --</option>
                <option value="puissance">Puissance Sexuelle</option>
                <option value="diabete">Diabète / Tension</option>
                <option value="estomac">Estomac / Ulcère</option>
                <option value="autre">Autre Maladie</option>
            </select>

            <label>VOS SYMPTÔMES :</label>
            <textarea id="details_symptomes" rows="3" placeholder="Décrivez votre problème..."></textarea>

            <button class="btn-avion" onclick="demarrerIA()">
                LANCER LE DIAGNOSTIC <i class="fas fa-paper-plane"></i>
            </button>

            <div id="reponse-ia"></div>

            <a href="https://wa.me/2207814179" class="whatsapp-box">
                PARLER AU DIRECTEUR SUR WHATSAPP <i class="fab fa-whatsapp"></i>
            </a>
        </div>
    </div>

    <script>
        function demarrerIA() {
            const nom = document.getElementById('nom_patient').value;
            const mal = document.getElementById('type_maladie').value;
            const sym = document.getElementById('details_symptomes').value;
            const box = document.getElementById('reponse-ia');

            if (!nom || !mal) { alert("Veuillez remplir le nom et choisir la maladie"); return; }

            let reponseTexte = "";

            // LOGIQUE DE RÉPONSE AUTOMATIQUE (COMME AVANT)
            if (mal === "puissance") {
                reponseTexte = "<strong>Rapport IA :</strong> Pour la puissance sexuelle, l'expert Mustapha Kourouma préconise un traitement à base de racines fortifiantes intégrées. <strong>Action :</strong> Contactez le directeur pour obtenir votre kit de traitement spécifique.";
            } else if (mal === "diabete") {
                reponseTexte = "<strong>Rapport IA :</strong> Cas de Diabète/Tension. L'IA recommande une stabilisation par des plantes amères de pharmacopée. <strong>Action :</strong> Le directeur doit valider votre dosage via WhatsApp.";
            } else if (mal === "estomac") {
                reponseTexte = "<strong>Rapport IA :</strong> Ulcère ou maux d'estomac détectés. <strong>Solution :</strong> Écorces apaisantes et régime sans piment. <strong>Action :</strong> Cliquez sur le bouton WhatsApp pour commander la solution liquide.";
            } else {
                reponseTexte = "<strong>Rapport IA :</strong> Maladie complexe. Analyse approfondie requise par le Fondateur Mustapha Kourouma. <strong>Action :</strong> Le dossier est transmis au directeur.";
            }

            // Affichage immédiat sur la plateforme
            box.innerHTML = `<h4>Analyse pour ${nom} :</h4> ${reponseTexte} <br><br> <small><em>Transfert vers WhatsApp du Directeur en cours...</em></small>`;
            box.style.display = "block";

            // Envoi automatique sur WhatsApp après 4 secondes
            setTimeout(() => {
                const finalMessage = `NOUVEAU PATIENT IA%0A*Nom:* ${nom}%0A*Maladie:* ${mal}%0A*Détails:* ${sym}%0A*Réponse IA:* ${reponseTexte.replace(/<[^>]*>/g, '')}`;
                window.location.href = `https://wa.me/2207814179?text=${finalMessage}`;
            }, 4000);
        }

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'fr'}, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <footer style="padding:30px; color:#555; font-size:12px;">
        &copy; 2026 Diaspora Mondiale Santé | Infrastructure Cloud Victor Mustapha Kourouma
    </footer>

</body>
</html>
