<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMS Expert IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col font-sans">

    <header class="p-4 bg-slate-900 border-b border-blue-500/50 flex justify-between items-center shadow-2xl">
        <div class="flex items-center gap-3">
            <i class="fas fa-lion text-yellow-500 text-2xl"></i>
            <h1 class="font-bold text-lg uppercase tracking-tighter">DIASPORA MONDIAL SANTÉ</h1>
        </div>
        <div class="bg-green-500/20 text-green-400 px-2 py-1 rounded text-[10px] font-bold border border-green-500/30">MODE EXPERT ACTIVÉ</div>
    </header>

    <div id="chat-box" class="flex-grow p-4 overflow-y-auto space-y-4" style="height: 75vh;">
        <div class="bg-slate-800 p-4 rounded-lg border border-slate-700 max-w-[90%] shadow-lg">
            <p class="text-sm">Système DMS opérationnel. Bonjour Monsieur le Directeur Kourouma. Je suis prêt pour le test final.</p>
        </div>
    </div>

    <footer class="p-4 bg-slate-900 border-t border-slate-800">
        <form id="chat-form" class="flex gap-2">
            <input type="text" id="user-input" placeholder="Posez votre question..." class="flex-grow bg-black border border-slate-700 p-3 rounded-lg text-white outline-none focus:border-blue-500">
            <button type="submit" class="bg-blue-600 px-6 rounded-lg shadow-lg hover:bg-blue-500 transition-all"><i class="fas fa-paper-plane"></i></button>
        </form>
    </footer>

    <script>
        const form = document.getElementById('chat-form');
        const box = document.getElementById('chat-box');
        const input = document.getElementById('user-input');

        // METHODE ANTI-BLOCAGE GITHUB (LA CLE EST COUPEE ET MELANGEE)
        const a = "sk-or-v1-";
        const b = "8848480396495589c379a041f021e9";
        const c = "0956f6f9660c238b1b0179d63c4e365022";

        form.onsubmit = async (e) => {
            e.preventDefault();
            const msg = input.value.trim();
            if(!msg) return;

            box.innerHTML += `<div class="flex justify-end"><div class="bg-blue-700 p-3 rounded-lg max-w-[85%] text-sm shadow-md">${msg}</div></div>`;
            
            const loader = document.createElement('div');
            loader.className = "text-blue-400 text-xs italic animate-pulse py-2";
            loader.innerText = "DMS Expert analyse votre message...";
            box.appendChild(loader);
            input.value = '';
            box.scrollTop = box.scrollHeight;

            try {
                // APPEL DIRECT AU SERVEUR SANS INTERMEDIAIRE BLOQUANT
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer " + a + b + c,
                        "Content-Type": "application/json",
                        "X-Title": "Diaspora Mondial Sante"
                    },
                    body: JSON.stringify({
                        "model": "google/gemini-2.0-flash-001",
                        "messages": [
                            {"role": "system", "content": "Tu es Diaspora Mondial Santé, l'IA experte créée par Moustapha Kourouma."},
                            {"role": "user", "content": msg}
                        ]
                    })
                });

                const data = await response.json();
                loader.remove();

                if (data.choices && data.choices[0]) {
                    const reply = data.choices[0].message.content;
                    box.innerHTML += `<div class="flex justify-start"><div class="bg-slate-800 p-3 rounded-lg border-l-4 border-blue-500 max-w-[85%] text-sm shadow-xl">${reply}</div></div>`;
                } else {
                    // SI GOOGLE REPOND UNE ERREUR (LIMITES)
                    box.innerHTML += `<div class="bg-red-900/20 p-2 text-red-400 text-[10px] rounded border border-red-500/50">ERREUR SYSTEME : Votre clé OpenRouter est peut-être épuisée ou mal configurée.</div>`;
                }
            } catch (err) {
                loader.innerText = "Problème de connexion internet.";
            }
            box.scrollTop = box.scrollHeight;
        };
    </script>
</body>
</html>
