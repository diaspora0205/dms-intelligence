function setL(l){ L=l; document.getElementById('userInput').placeholder=(L=='fr'?'Écrivez ici...':'Write here...'); }

function run() {
    let v=document.getElementById('userInput').value.toLowerCase().trim();
    let res=document.getElementById('res');
    if(v.length<2)return;
    let f=false;
    for(let i of db){
        for(let k of i.k){
            if(v.includes(k)){
                res.innerHTML="<b>DÉCISION DU DIRECTEUR :</b><br><br>"+i[L];
                f=true;break;
            }
        }
    }
    if(!f)res.innerHTML="ALERTE DMS: Maladie non reconnue. Contactez le Directeur.";
    res.style.display="block";
    document.getElementById('wel').style.display="none";
    document.getElementById('userInput').value="";
}
