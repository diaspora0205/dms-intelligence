<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMS Intelligence - Moustapha Kourouma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col">

    <header class="bg-blue-900 p-4 shadow-2xl border-b border-blue-400">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <i class="fas fa-lion text-yellow-400"></i> DMS Intelligence
            </h1>
            <span class="bg-green-500 px-3 py-1 rounded-full text-xs animate-pulse font-bold text-black">SYSTÈME ACTIF</span>
        </div>
    </header>

    <main id="chat-container" class="flex-grow container mx-auto p-4 overflow-y-auto space-y-4" style="max-height: 80vh;">
        <div class="flex justify-start">
            <div class="bg-gray-800 p-4 rounded-lg border-l-4 border-yellow-400 max-w-[85%] shadow-lg">
                <p class="font-bold text-yellow-400 mb-1">DMS Intelligence :</p>
                Bonjour Monsieur le Directeur Moustapha Kourouma. Je suis prêt. Quel est votre sujet de recherche aujourd'hui ?
            </div>
        </div>
    </main>

    <footer class="p-4 bg-gray-900 border-t border-gray-700">
        <form id="chat-form" class="container mx-auto flex gap-2">
            <input type="text" id="message-input" placeholder="Posez votre question à l'expert..." 
                class="flex-grow bg-gray-800 border border-gray-600 p-4 rounded-xl focus:outline-none focus:border-blue-500 text-white shadow-inner">
            <button type="submit" class="bg-blue-600 hover:bg-blue-500 px-6 py-4 rounded-xl transition-all font-bold shadow-lg">
                <i class="fas fa-paper-plane"></i>
            </button>
        </form>
        <p class="text-center text-xs text-gray-500 mt-2">© 2026 Diaspora Mondial Santé - Expertise Traditionnelle & Moderne</p>
    </footer>

    <script>
    const chatForm = document.getElementById('chat-form');
    const chatContainer = document.getElementById('chat-container');
    const messageInput = document.getElementById('message-input');

    const DMS_PROMPT = "Tu es l'IA DMS Intelligence, créée par Moustapha Kourouma. Expert en santé mondiale, tu maîtrises parfaitement la médecine moderne et la pharmacopée traditionnelle africaine. Tu es précis et professionnel.";

    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const message = messageInput.value.trim();
        if (!message) return;

        // Affichage Utilisateur
        const userDiv = document.createElement('div');
        userDiv.className = 'flex justify-end mb-4';
        userDiv.innerHTML = `<div class="bg-blue-600 text-white p-3 rounded-lg max-w-[80%] shadow-md">${message}</div>`;
        chatContainer.appendChild(userDiv);
        messageInput.value = '';
        
        // Attente
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'flex justify-start mb-4';
        loadingDiv.innerHTML = `<div class="bg-gray-800 text-blue-200 p-3 rounded-lg animate-pulse shadow-md">DMS Analyse en cours...</div>`;
        chatContainer.appendChild(loadingDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;

        try {
            const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer 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',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'google/gemini-2.0-flash-001',
                    messages: [
                        { role: 'system', content: DMS_PROMPT },
                        { role: 'user', content: message }
                    ]
                })
            });

            const data = await response.json();
            loadingDiv.remove();

            const aiDiv = document.createElement('div');
            aiDiv.className = 'flex justify-start mb-4';
            const aiMessage = data.choices[0].message.content;
            aiDiv.innerHTML = `<div class="bg-gray-800 text-gray-100 p-3 rounded-lg border-l-4 border-blue-500 shadow-xl">${aiMessage}</div>`;
            chatContainer.appendChild(aiDiv);
            
        } catch (error) {
            loadingDiv.innerHTML = `<div class="bg-red-900 text-white p-3 rounded-lg">Erreur de connexion. DMS se reconnecte...</div>`;
        }
        chatContainer.scrollTop = chatContainer.scrollHeight;
    });
    </script>

</body>
    </html>
