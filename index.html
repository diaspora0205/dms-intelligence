<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMS IA - MÉDECINE TRADITIONNELLE INTÉGRÉE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffb703; --dark: #050a12; --blue: #219ebc; --medical-blue: #023e8a; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding-bottom: 170px; }
        
        .header { background: var(--blue); padding: 15px; text-align: center; border-bottom: 4px solid var(--gold); }
        .title { color: var(--gold); font-size: 18px; font-weight: bold; margin: 0; text-transform: uppercase; }
        .subtitle { color: white; font-size: 14px; font-weight: bold; margin-top: 5px; }
        
        /* Style Traducteur Pro */
        #google_translate_element { margin-top: 10px; min-height: 40px; }
        .goog-te-gadget-simple { background-color: white !important; border-radius: 5px !important; padding: 5px !important; }

        #datetime { font-size: 13px; margin: 10px 0; color: #fff; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 5px; }

        .card { background: white; color: black; margin: 15px; padding: 20px; border-radius: 15px; border-left: 10px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #res { background: #f8f9fa; color: var(--medical-blue); padding: 15px; border-radius: 10px; margin-top: 15px; display: none; font-weight: bold; border: 2px solid var(--blue); line-height: 1.6; }
        
        .dashboard { background: rgba(255,255,255,0.1); margin: 15px; padding: 12px; border-radius: 10px; text-align: center; border: 1px solid var(--gold); color: var(--gold); font-size: 13px; font-weight: bold; }
        
        .stats-box { background: white; color: black; margin: 15px; padding: 15px; border-radius: 15px; text-align: center; border: 2px solid var(--gold); }
        .counter-img { height: 45px; }

        .footer-fixed { position: fixed; bottom: 0; width: 100%; background: var(--dark); border-top: 2px solid var(--gold); z-index: 1000; }
        .input-box { display: flex; gap: 8px; padding: 15px; }
        input { flex: 1; padding: 15px; border-radius: 10px; border: 2px solid var(--gold); font-size: 16px; outline: none; }
        .btn-send { background: var(--gold); border: none; padding: 15px; border-radius: 10px; color: white; cursor: pointer; }
        .wa-btn { background: #25d366; color: white; text-align: center; padding: 15px; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body onload="startSystem()">

    <div class="header">
        <p class="title">DIASPORA MONDIAL SANTÉ (DMS)</p>
        <p class="subtitle">MÉDECINE TRADITIONNELLE INTÉGRÉE</p>
        <div id="datetime">Chargement...</div>
        <div id="google_translate_element"></div>
    </div>

    <div class="card">
        <h3 style="margin-top:0; color: var(--medical-blue);">ANALYSEUR IA DMS</h3>
        <p id="wel">Tapez une maladie (Ex: Tension, Nerfs, Fatigue...)</p>
        <div id="res"></div>
    </div>

    <div class="dashboard">
        🌍 SYSTÈME DMS : 9 LANGUES INTERNATIONALES ACTIVÉES
    </div>

    <div class="stats-box">
        <p style="font-size: 11px; font-weight: bold; color: #555; margin: 0;">AUDIENCE MONDIALE DMS</p>
        <img src="https://profile-counter.glitch.me/diaspora-mondial-sante/count.svg" alt="Compteur DMS" class="counter-img">
    </div>

    <div class="footer-fixed">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Écrivez votre maladie ici...">
            <button class="btn-send" onclick="ask()"><i class="fas fa-paper-plane fa-lg"></i></button>
        </div>
        <a href="https://wa.me/2207814179" class="wa-btn">
            <i class="fab fa-whatsapp fa-2x"></i> VOCAL AU DIRECTEUR
        </a>
    </div>

    <script>
        function startSystem() {
            updateTime();
            setInterval(updateTime, 1000);
        }

        function updateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('datetime').innerHTML = now.toLocaleDateString('fr-FR', options);
        }

        const data = [
            { k: ["palu", "fievre"], r: "DMS : Risque de Paludisme. Utilisez l'Artémisia. Repos et hydratation." },
            { k: ["impuissance", "sexe", "faiblesse"], r: "DMS : Petit Cola et Gingembre. ATTENTION : Interdit aux hypertendus." },
            { k: ["diabete", "sucre"], r: "DMS : Feuilles de Neem ou Cannelle. Supprimez le sucre." },
            { k: ["tension", "hypertension"], r: "DMS : Infusion d'Hibiscus tiède. Zéro sel. Repos total." },
            { k: ["nerfs", "stress"], r: "DMS : Infusion de Verveine ou Citronnelle. Méditation." },
            { k: ["toux", "rhume"], r: "DMS : Mélange miel, citron et ail chaud." },
            { k: ["estomac", "gaz"], r: "DMS : Charbon végétal ou infusion de Gingembre." },
            { k: ["foie", "hepatite"], r: "DMS : Cure de Desmodium. Évitez l'alcool." },
            { k: ["rein", "calculs"], r: "DMS : Hydratation massive. Racine de Persil." },
            { k: ["dos", "douleur"], r: "DMS : Massage au beurre de Karité." },
            { k: ["peau", "bouton"], r: "DMS : Gel d'Aloe Vera ou Huile de Neem." },
            { k: ["constipation"], r: "DMS : Consommez des fibres (Papaye)." },
            { k: ["anemie", "sang"], r: "DMS : Consommez Betterave et Moringa." },
            { k: ["insomnie", "sommeil"], r: "DMS : Infusion de Fleur d'Oranger." },
            { k: ["coeur", "palpitation"], r: "DMS : Infusion d'Aubépine. Consultez un spécialiste." },
            { k: ["yeux", "vision"], r: "DMS : Vitamine A (Carottes). Repos visuel." },
            { k: ["asthme", "respiration"], r: "DMS : Évitez la poussière. Infusion de Thym." },
            { k: ["fatigue", "astenie"], r: "DMS : Cure de Moringa ou Poudre de Baobab." },
            { k: ["dents", "gencives"], r: "DMS : Clou de Girofle sur la zone." },
            { k: ["poids", "maigrir"], r: "DMS : Thé vert et Citron le matin." },
            { k: ["regles", "douleurs"], r: "DMS : Infusion de Persil chaud." },
            { k: ["sinusite"], r: "DMS : Inhalation d'Eucalyptus." },
            { k: ["hemorroides"], r: "DMS : Bain de siège froid. Évitez le piment." },
            { k: ["memoire"], r: "DMS : Consommez des Noix et du Ginkgo Biloba." },
            { k: ["cholesterol"], r: "DMS : Ail cru et Huile d'Olive." },
            { k: ["vers", "parasites"], r: "DMS : Graines de Courge ou Ail." },
            { k: ["brulure"], r: "DMS : Miel ou Aloe Vera immédiatement." },
            { k: ["grippe"], r: "DMS : Infusion de Gingembre, Citron et Miel." },
            { k: ["prostate"], r: "DMS : Graines de Courge. Consultez après 50 ans." },
            { k: ["grossesse"], r: "DMS : Priorité médicale. Consultez une sage-femme." }
        ];

        function ask() {
            let input = document.getElementById('userInput').value.toLowerCase();
            let out = document.getElementById('res');
            let wel = document.getElementById('wel');
            if(input.length < 2) return;
            let found = false;
            for(let item of data){
                for(let key of item.k){
                    if(input.includes(key)){
                        out.innerHTML = "<b>RÉSULTAT DMS :</b><br><br>" + item.r;
                        found = true; break;
                    }
                }
            }
            if(!found) out.innerHTML = "<b>NOTE DMS :</b> Cas complexe. Contactez le Directeur par vocal.";
            out.style.display = "block";
            wel.style.display = "none";
        }

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'fr',
                includedLanguages: 'en,ar,pt,es,de,zh-CN,ru,it,fr',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
