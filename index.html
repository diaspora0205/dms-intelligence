<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diaspora Mondial Santé - DMS IA</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e8f5e9; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; border-top: 5px solid #2e7d32; }
        .logo { width: 80px; margin-bottom: 10px; }
        h1 { color: #1b5e20; font-size: 22px; margin-bottom: 5px; }
        p { color: #4caf50; font-weight: bold; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #a5d6a7; border-radius: 8px; box-sizing: border-box; outline: none; font-size: 16px; }
        button { background-color: #2e7d32; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #1b5e20; }
        #resultat { margin-top: 20px; padding: 15px; border-radius: 8px; background-color: #f1f8e9; border-left: 5px solid #2e7d32; display: none; text-align: left; color: #333; line-height: 1.5; }
        .expert-badge { margin-top: 15px; font-size: 12px; color: #666; font-style: italic; }
        .footer { margin-top: 20px; font-size: 10px; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://via.placeholder.com/80/2e7d32/ffffff?text=DMS" alt="Logo DMS" class="logo">
    <h1>DIASPORA MONDIAL SANTÉ</h1>
    <p>Expertise IA & Médecine Traditionnelle</p>
    
    <input type="text" id="userQuery" placeholder="Entrez une maladie (ex: Palu, Tension...)" onkeypress="if(event.key === 'Enter') lancerDiagnostic()">
    <button onclick="lancerDiagnostic()">LANCER LE DIAGNOSTIC</button>

    <div id="resultat"></div>
    
    <div class="expert-badge">Système supervisé par Mustapha Kourouma<br>Expert Google Cloud (Top 24 Mondial)</div>
</div>

<div class="footer">© 2026 Diaspora Mondial Santé - Tous droits réservés</div>

<script>
    // --- MOTEUR MÉDICAL INTELLIGENT DMS ---
    const database = [
        { 
            mots: ["diabete", "sucre", "glycemie", "diabaite"], 
            reponse: "<b>SOLUTION DMS (Diabète) :</b> Utilisation de feuilles de Moringa séchées en infusion et décoction de racines pays 1.<br>⚠️ <i>Attention : Interdit aux femmes enceintes.</i>" 
        },
        { 
            mots: ["tension", "hypertension", "pression", "coeur"], 
            reponse: "<b>SOLUTION DMS (Tension) :</b> Jus de Bissap noir concentré sans sucre et une gousse d'ail frais le matin.<br>⚠️ <i>Note : Déconseillé en cas d'anémie sévère.</i>" 
        },
        { 
            mots: ["palu", "paludisme", "fievre", "chaud", "corps"], 
            reponse: "<b>SOLUTION DMS (Palu) :</b> Décoction de feuilles de Neem bouillies (lavage et boisson) et Quinquina." 
        },
        { 
            mots: ["estomac", "ventre", "gastrite", "aigreur", "gaz"], 
            reponse: "<b>SOLUTION DMS (Maux d'estomac) :</b> Mélange de charbon végétal activé et infusion légère de gingembre doux." 
        },
        { 
            mots: ["hemorroide", "koukourou", "fesses"], 
            reponse: "<b>SOLUTION DMS (Hémorroïdes) :</b> Bain de siège avec écorces de baobab et application de beurre de karité pur." 
        }
    ];

    function lancerDiagnostic() {
        const inputField = document.getElementById('userQuery');
        const q = inputField.value.toLowerCase().trim();
        const res = document.getElementById('resultat');

        if (q === "") return;

        // 1. Préparation de l'affichage
        res.style.display = "block";
        res.innerHTML = "<i>Analyse des algorithmes DMS en cours...</i>";

        // 2. ACTION CRUCIALE : Effacer le champ immédiatement (Clavier libre)
        inputField.value = "";

        // 3. Simulation de réflexion IA (1 seconde)
        setTimeout(() => {
            let reponseTrouvee = "";

            // Recherche intelligente par mots-clés
            for (let item of database) {
                if (item.mots.some(mot => q.includes(mot))) {
                    reponseTrouvee = item.reponse;
                    break;
                }
            }

            if (reponseTrouvee) {
                res.innerHTML = reponseTrouvee + "<br><br><small style='color: #2e7d32;'>✔ Solution validée par le Directeur</small>";
            } else {
                res.innerHTML = "<b>ANALYSE DMS :</b> Cas complexe détecté.<br>👉 Votre situation nécessite l'analyse directe de l'Expert.<br><a href='https://wa.me/2202500000' style='color:#1b5e20; font-weight:bold; text-decoration:none;'>CONTACTER LE DIRECTEUR SUR WHATSAPP</a>";
            }
        }, 1000);
    }
</script>

</body>
</html>
