<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMS Intelligence - Officiel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .chat-container { height: 65vh; overflow-y: auto; scrollbar-width: none; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .lion-gradient { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <header class="p-4 glass shadow-2xl flex items-center justify-between border-b border-blue-500/30">
        <div class="flex items-center gap-3">
            <div class="lion-gradient p-2 rounded-full shadow-lg"><i class="fas fa-lion text-2xl text-white"></i></div>
            <div>
                <h1 class="font-bold text-xl tracking-tighter">DMS <span class="text-blue-400">INTELLIGENCE</span></h1>
                <p class="text-[9px] text-blue-300 uppercase tracking-widest font-bold">Diaspora Mondial Santé</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            <span class="text-[10px] text-green-400 font-bold uppercase tracking-widest">Système Actif</span>
        </div>
    </header>

    <main class="flex-grow p-4 chat-container" id="chatBox">
        <div class="mb-4 flex justify-start">
            <div class="glass p-4 rounded-2xl rounded-tl-none max-w-[85%] border-l-4 border-blue-500 shadow-xl">
                <p class="text-sm">"Bonjour Monsieur le Directeur Moustapha Kourouma. Le moteur DMS Intelligence est prêt. Comment puis-je vous aider ?"</p>
            </div>
        </div>
    </main>

    <footer class="p-4 glass border-t border-blue-500/20">
        <div class="flex gap-2 max-w-4xl mx-auto">
            <input type="text" id="userInput" placeholder="Parlez au Lion..." class="flex-grow bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-blue-500">
            <button onclick="sendMessage()" class="lion-gradient p-4 rounded-2xl shadow-lg transition-transform active:scale-90"><i class="fas fa-paper-plane text-white"></i></button>
        </div>
    </footer>

    <script>
        // LA CLÉ EST MAINTENANT DANS UN COFFRE-FORT (BASE64)
        const _v = "QUl6YVN5REZELVRSSVJtRnluQUJPMkFlMXZxUk1BXzhMendyeVNn";
        
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            if (!input.value.trim()) return;

            const userText = input.value;
            chatBox.innerHTML += `<div class="mb-4 flex justify-end"><div class="lion-gradient p-3 rounded-2xl max-w-[85%] text-sm shadow-md">${userText}</div></div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // Décodage de la clé au dernier moment
                const k = atob(_v);
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${k}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Tu es l'IA de Diaspora Mondial Santé (DMS), créée par Moustapha Kourouma. Réponds en français à : " + userText }] }] })
                });
                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                chatBox.innerHTML += `<div class="mb-4 flex justify-start"><div class="glass p-3 rounded-2xl border-l-4 border-blue-400 text-sm shadow-sm">${aiResponse}</div></div>`;
            } catch (e) {
                chatBox.innerHTML += `<div class="text-blue-400 text-center text-xs mt-2 italic">Analyse en cours... Réessayez dans 5 secondes.</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        document.getElementById('userInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
