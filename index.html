<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DMS - VICTOR MOUSTAPHA KOUROUMA (EXPERT GOOGLE TOP 24)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffb703; --dark: #050a12; --blue: #219ebc; --white: #ffffff; }
        body { background: var(--dark); color: var(--white); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 220px; text-align: center; }
        
        .header { background: linear-gradient(to bottom, #023047, var(--blue)); padding: 20px 10px; border-bottom: 4px solid var(--gold); }
        .title { color: var(--gold); font-size: 20px; font-weight: 900; margin: 0; text-transform: uppercase; }
        .director-badge { background: var(--gold); color: #000; font-size: 11px; font-weight: bold; padding: 5px 15px; border-radius: 20px; display: inline-block; margin-top: 8px; }
        
        #datetime { background: #001219; color: var(--gold); padding: 8px; font-size: 12px; font-family: monospace; border-bottom: 1px solid var(--gold); }
        #google_translate_element { margin: 15px auto; width: 90%; min-height: 40px; }

        .search-area { background: var(--white); color: #333; margin: 15px; padding: 25px; border-radius: 20px; border-left: 8px solid var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #res { background: #f0f7ff; color: #003049; padding: 18px; border-radius: 12px; margin-top: 15px; display: none; font-weight: 700; border: 2px solid var(--blue); font-size: 17px; text-align: left; }

        /* GALERIE DES BADGES EXPERT */
        .expert-section { background: rgba(255,255,255,0.03); margin: 20px 15px; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,183,3,0.3); }
        .badge-grid { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 10px; }
        .badge-card { width: 85px; text-align: center; }
        .badge-card img { width: 100%; border-radius: 10px; border: 2px solid white; background: white; }
        .badge-card p { font-size: 9px; color: var(--gold); font-weight: bold; margin-top: 5px; }

        /* COMPTEUR DE VISITES */
        .counter-container { margin: 20px; padding: 15px; }
        .digital-counter { background: #000; color: #39FF14; font-family: 'Courier New', monospace; font-size: 26px; padding: 10px 20px; border: 2px solid #39FF14; border-radius: 8px; display: inline-block; box-shadow: 0 0 10px #39FF14; }

        /* FOOTER DE COMMANDE */
        .footer-fixed { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 4px solid var(--gold); z-index: 1000; }
        .input-group { display: flex; padding: 12px; gap: 10px; background: #050a12; }
        input { flex: 1; padding: 16px; border-radius: 10px; border: 2px solid var(--gold); font-size: 16px; }
        .btn-go { background: var(--gold); border: none; width: 60px; border-radius: 10px; cursor: pointer; color: black; }
        .wa-link { background: #25d366; color: white; text-decoration: none; padding: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; }
    </style>
</head>
<body onload="initApp()">

    <div class="header">
        <p class="title">DIASPORA MONDIAL SANTÉ</p>
        <div class="director-badge">DIRECTEUR : VICTOR MOUSTAPHA KOUROUMA (TOP 24 MONDIAL)</div>
    </div>

    <div id="datetime">...</div>
    <div id="google_translate_element"></div>

    <div class="search-area">
        <h3 style="margin:0; color:#023047;"><i class="fas fa-leaf"></i> MOTEUR TRADITIONNEL IA</h3>
        <p id="hint" style="font-size:14px; color:#666; margin-top:10px;">Quelle pathologie analysez-vous aujourd'hui ?</p>
        <div id="res"></div>
    </div>

    <div class="expert-section">
        <p style="color:var(--gold); font-size:11px; font-weight:bold; margin:0; letter-spacing:1px;">ACCRÉDITATIONS GOOGLE CLOUD</p>
        <div class="badge-grid">
            <div class="badge-card">
                <img src="8WAx69Kk1nJNoipzoi0vmesqTSEsQlKcbiSUJW0VeOA=.png">
                <p>ARGENT</p>
            </div>
            <div class="badge-card">
                <img src="BVV_j_0h1ZRwMel0M0Ip3uZcNXd_zeWEqkZLZ2umN3E=.png">
                <p>OR 24e</p>
            </div>
            <div class="badge-card">
                <img src="BVV_j_0h1ZRwMel0M0Ip3uZcNXd_zeWEqkZLZ2umN3E= (1).png">
                <p>EXPERT IA</p>
            </div>
        </div>
    </div>

    <div class="counter-container">
        <p style="color:var(--gold); font-size:10px; margin-bottom:10px; font-weight:bold;">VISITES CERTIFIÉES DMS</p>
        <div class="digital-counter" id="visit-count">0000</div>
    </div>

    <div class="footer-fixed">
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Écrivez la maladie ici...">
            <button class="btn-go" onclick="analyze()"><i class="fas fa-search fa-lg"></i></button>
        </div>
        <a href="https://wa.me/2207814179" class="wa-link">
            <i class="fab fa-whatsapp fa-2x"></i> PARLER AU DIRECTEUR
        </a>
    </div>

    <script>
        const db = [
            {k:["diabete","sucre"], r:"DMS : Infusion de feuilles de Neem ou Cannelle. Supprimez sucre et pain blanc."},
            {k:["estomac","ulcere","ventre"], r:"DMS : Jus de pomme de terre crue le matin à jeun ou infusion de Gingembre frais."},
            {k:["impuissance","sexe","erection"], r:"DMS : Petit Cola, Gingembre et Miel pur. (Vigilance si hypertension)."},
            {k:["tension","hyper"], r:"DMS : Infusion d'Hibiscus (Bissap) tiède sans sucre. Zéro sel dans l'alimentation."},
            {k:["hemorroide","anus"], r:"DMS : Bain de siège à l'eau froide et décoction d'écorce de manguier."},
            {k:["palu","fievre"], r:"DMS : Infusion d'Artémisia ou feuilles de Neem. 3 tasses par jour."},
            {k:["toux","rhume"], r:"DMS : Sirop naturel : Miel, Citron et Ail écrasé."},
            {k:["nerf","stress"], r:"DMS : Infusion de Citronnelle ou Verveine. Sommeil avant 22h."},
            {k:["fatigue"], r:"DMS : Cure de Moringa (1 cuillère à café par jour dans un jus)."},
            {k:["foie"], r:"DMS : Cure de Desmodium et arrêt total de l'alcool."}
        ];

        function initApp() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('datetime').innerHTML = now.toLocaleString('fr-FR').toUpperCase();
            }, 1000);

            let v = localStorage.getItem('dms_v2') || 178;
            v = parseInt(v) + 1;
            localStorage.setItem('dms_v2', v);
            document.getElementById('visit-count').innerText = v.toString().padStart(4, '0');
        }

        function analyze() {
            let q = document.getElementById('userInput').value.toLowerCase().trim();
            let res = document.getElementById('res');
            let hint = document.getElementById('hint');
            if(q.length < 2) return;

            let final = "Cas spécifique détecté. Pour un protocole de guérison exact, contactez le Directeur sur WhatsApp.";
            for(let item of db) {
                if(item.k.some(key => q.includes(key))) { final = item.r; break; }
            }

            res.innerHTML = ""; res.style.display = "block"; hint.style.display = "none";
            let i = 0;
            function typing() {
                if (i < final.length) {
                    res.innerHTML += final.charAt(i); i++; setTimeout(typing, 25);
                }
            }
            typing();
            document.getElementById('userInput').value = "";
        }

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'fr'}, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
    </html>
