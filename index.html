<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMS - MUSTAPHA KOUROUMA EXPERT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Helvetica', Arial, sans-serif; background: #002d24; margin: 0; padding: 0; color: white; }
        
        /* HEADER - L'AUTORITÉ DE L'EXPERT */
        .header { background: #004d40; padding: 30px 10px; text-align: center; border-bottom: 5px solid #ffcc00; }
        .badge-expert { background: white; color: #004d40; padding: 10px 20px; border-radius: 50px; display: inline-block; margin: 5px; font-weight: bold; border: 2px solid #ffcc00; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }

        /* BARRE D'INFOS - LARGE ET CLAIRE */
        .info-bar { background: #111; padding: 15px; display: flex; justify-content: space-around; font-size: 14px; border-bottom: 2px solid #333; }
        .stat-item { color: #ffcc00; font-weight: bold; }

        /* LE MOTEUR DE RECHERCHE - CONFORT MAXIMAL */
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .search-card { background: white; color: #333; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .input-group { position: relative; margin-top: 20px; }
        .input-main { width: 100%; padding: 18px 60px 18px 20px; border-radius: 35px; border: 2px solid #004d40; font-size: 16px; outline: none; box-sizing: border-box; }
        .btn-send { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: #004d40; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }

        /* ZONE DE RÉPONSE - CLAIRE ET NETTE */
        #resultat { margin-top: 25px; padding: 20px; border-radius: 10px; background: #f9f9f9; border-left: 8px solid #ffcc00; display: none; color: #000; text-align: left; font-size: 15px; line-height: 1.6; }

        /* BOUTON WHATSAPP */
        .whatsapp-fix { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 5px 20px rgba(0,0,0,0.4); z-index: 999; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size: 24px;">DIASPORA MONDIAL SANTÉ (DMS)</h1>
    <p style="margin:10px 0;">Directeur : <strong>Mustapha Kourouma</strong></p>
    <div>
        <div class="badge-expert">🥉 Bronze : 2e</div>
        <div class="badge-expert">🥈 Argent : 3e</div>
        <div class="badge-expert" style="background:#ffcc00;">🥇 Or : 24e Mondial Google Cloud</div>
    </div>
</div>

<div class="info-bar">
    <div id="horloge"></div>
    <div>Visiteurs : <span class="stat-item" id="v-count">2518</span></div>
</div>

<div id="google_translate_element" style="text-align:center; padding:10px;"></div>

<div class="container">
    <div class="search-card">
        <h2 style="color:#004d40; margin-top:0;">Analyse IA Certifiée</h2>
        <p style="color:#666;">Posez votre question sur une maladie pour obtenir la solution DMS.</p>
        
        <div class="input-group">
            <input type="text" id="userQuery" class="input-main" placeholder="Ex: Quel médicament pour le diabète ?">
            <button class="btn-send" onclick="trouverSolution()"><i class="fas fa-paper-plane"></i></button>
        </div>

        <div id="resultat"></div>
    </div>
</div>

<a href="https://wa.me/2202500000" class="whatsapp-fix">
    <i class="fab fa-whatsapp fa-lg"></i> WhatsApp Directeur
</a>

<script>
    // 1. Horloge Propre
    function majHeure() {
        const d = new Date();
        document.getElementById('horloge').innerText = d.toLocaleDateString() + " " + d.toLocaleTimeString();
    }
    setInterval(majHeure, 1000);

    // 2. Compteur Visiteurs
    let visiteurs = 2518;
    setInterval(() => {
        visiteurs += 1;
        document.getElementById('v-count').innerText = visiteurs;
    }, 12000);

    // 3. Le Moteur de Solution (Base de données intelligente)
    const dmsData = [
        { mots: ["diabete", "sucre", "glycemie"], reponse: "<b>SOLUTION DMS (Diabète) :</b> Utilisation de la plante <i>Moringa</i> couplée aux racines secrètes du pays 1. Cette combinaison stabilise le taux de glycémie naturellement. <br>✅ Validé par Mustapha Kourouma." },
        { mots: ["tension", "hypertension", "coeur"], reponse: "<b>SOLUTION DMS (Tension) :</b> Infusion d'Hibiscus (Bissap noir) et consommation d'ail frais chaque matin. Éviter le sel raffiné. <br>✅ Validé par Mustapha Kourouma." },
        { mots: ["palu", "paludisme", "fievre"], reponse: "<b>SOLUTION DMS (Paludisme) :</b> Décoction forte de feuilles de Neem ou Artémisia. Prendre 3 tasses par jour pendant 5 jours. <br>✅ Validé par Mustapha Kourouma." },
        { mots: ["maux de ventre", "estomac", "digestion"], reponse: "<b>SOLUTION DMS (Estomac) :</b> Charbon végétal actif ou infusion de Gingembre frais. Nettoie le système digestif immédiatement. <br>✅ Validé par Mustapha Kourouma." }
    ];

    function trouverSolution() {
        const query = document.getElementById('userQuery').value.toLowerCase();
        const box = document.getElementById('resultat');
        box.style.display = "block";
        box.innerHTML = "<i>Recherche dans la base de l'Expert Google Cloud...</i>";

        setTimeout(() => {
            let resultatFinal = "";
            for (let item of dmsData) {
                if (item.mots.some(m => query.includes(m))) {
                    resultatFinal = item.reponse;
                    break;
                }
            }

            if (resultatFinal) {
                box.innerHTML = resultatFinal;
            } else {
                box.innerHTML = "<b>ANALYSE DMS :</b> Votre question est complexe. <br>👉 Cliquez sur le bouton <b>WhatsApp</b> ci-dessous pour une consultation directe avec le Directeur Mustapha.";
            }
        }, 1000);
    }

    function googleTranslateElementInit() {
        new google.translate.TranslateElement({pageLanguage: 'fr'}, 'google_translate_element');
    }
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
