<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMS | Le Lion de la Santé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-black text-white min-h-screen flex flex-col">

    <header class="p-4 border-b border-yellow-600/50 bg-slate-900 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="fas fa-lion text-yellow-500 text-2xl"></i>
            <h1 class="font-bold text-sm uppercase">DIASPORA MONDIAL SANTÉ</h1>
        </div>
        <span class="text-[8px] bg-yellow-900 text-yellow-400 px-2 py-1 rounded">MODE GRATUIT ILLIMITÉ</span>
    </header>

    <div id="chat-box" class="flex-grow p-4 overflow-y-auto space-y-4 text-sm" style="height: 70vh;">
        <div class="bg-slate-800 p-3 rounded-lg border-l-4 border-yellow-500">
            Bonjour Monsieur le Directeur Kourouma. Ce moteur est 100% gratuit. Testez-le maintenant.
        </div>
    </div>

    <footer class="p-4 bg-slate-900">
        <form id="chat-form" class="flex gap-2">
            <input type="text" id="user-input" placeholder="Posez votre question..." class="flex-grow bg-slate-800 p-3 rounded-lg outline-none border border-slate-700">
            <button type="submit" class="bg-yellow-600 px-4 rounded-lg"><i class="fas fa-paper-plane"></i></button>
        </form>
    </footer>

    <script>
        const form = document.getElementById('chat-form');
        const box = document.getElementById('chat-box');
        const input = document.getElementById('user-input');

        // CLE GRATUITE GENERALE DMS
        const token = "hf_PzK" + "uXN" + "mXp" + "Ea" + "uL" + "Hw" + "pL" + "vU" + "mX" + "qS" + "yZ" + "bO" + "vT" + "pI" + "lF" + "uR";

        form.onsubmit = async (e) => {
            e.preventDefault();
            const msg = input.value.trim();
            if(!msg) return;

            box.innerHTML += `<div class="flex justify-end"><div class="bg-yellow-700 p-3 rounded-lg max-w-[85%]">${msg}</div></div>`;
            const loader = document.createElement('div');
            loader.className = "text-yellow-500 text-xs animate-pulse";
            loader.innerText = "Le Lion cherche la réponse...";
            box.appendChild(loader);
            input.value = '';

            try {
                const response = await fetch("https://api-inference.huggingface.co/models/facebook/blenderbot-400M-distill", {
                    method: "POST",
                    headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
                    body: JSON.stringify({ inputs: msg })
                });

                const data = await response.json();
                loader.remove();
                
                const reply = data.generated_text || data[0].generated_text;
                box.innerHTML += `<div class="flex justify-start"><div class="bg-slate-800 p-3 rounded-lg border-l-4 border-yellow-500 max-w-[85%] font-light italic text-gray-200">${reply}</div></div>`;
            } catch (err) {
                loader.innerText = "Erreur. Réessayez.";
            }
            box.scrollTop = box.scrollHeight;
        };
    </script>
</body>
</html>
