<script>
let L = 'fr';
const db = [
    { k: ["morue", "perte", "infection"], fr: "SOLUTION DMS : Traitement par décoction de nos racines antibiotiques et hygiène de plantes.", en: "DMS CARE : DMS antibiotic root decoction and herbal hygiene." },
    { k: ["ventre", "estomac", "gaz"], fr: "SOLUTION DMS : Infusion Thé Vert avec Argile Verte ou Aloe Vera pur à jeun.", en: "DMS CARE : Green Tea with Green Clay or Pure Aloe Vera." },

    { k: ["hemorite", "hemorroide", "piles"], fr: "SOLUTION DMS : Bain de siège écorces cicatrisantes avec racines laxatives DMS.", en: "DMS CARE : Warm sitz bath with DMS laxative roots." },
    { k: ["diabete", "sucre"], fr: "SOLUTION DMS : Infusion de feuilles de Neem et poudre de Moringa.", en: "DMS CARE : Neem and Moringa leaf infusion." },
    { k: ["tension", "pression"], fr: "SOLUTION DMS : Ail frais pilé et infusion de feuilles d'olivier sauvage.", en: "DMS CARE : Fresh garlic and wild olive leaf infusion." },

    { k: ["fertilité"], fr: "SOLUTION DMS : Cure de racines régénératrices DMS.", en: "DMS CARE : Tonic roots cure DMS." }
];

function setL(l) { L = l; document.getElementById('userIn').placeholder = (L=='fr'?'Écrivez votre maladie...':'Write your disease...'); }

function runDMS() {
    let val = document.getElementById('userIn').value.toLowerCase().trim();
    let out = document.getElementById('output');
    let wel = document.getElementById('welcome');
    if (val.length < 2) return;
    let found = false;
    for(let item of db) {
        for(let key of item.k) {
            if(val.includes(key)) {
                out.innerHTML = "<b>DÉCISION DU DIRECTEUR :</b><br><br>" + item[L];
                found = true; break;
            }
        }
    }
    if(!found) out.innerHTML = "<b>ALERTE DMS :</b> Maladie non reconnue. Contactez le Directeur.";
    out.style.display = "block";
    wel.style.display = "none";
    document.getElementById('userIn').value = "";
}
