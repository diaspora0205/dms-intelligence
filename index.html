<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMS Intelligence - Officiel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .chat-container { height: 70vh; overflow-y: auto; scrollbar-width: thin; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="p-4 glass shadow-2xl flex items-center justify-between border-b border-blue-500/30">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-full shadow-lg shadow-blue-500/50">
                <i class="fas fa-lion text-2xl text-white"></i>
            </div>
            <div>
                <h1 class="font-bold text-xl tracking-wide">DMS <span class="text-blue-400">INTELLIGENCE</span></h1>
                <p class="text-[10px] text-blue-300 uppercase tracking-widest font-semibold">Diaspora Mondial Santé</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            <span class="text-xs font-mono">SERVEUR ACTIF</span>
        </div>
    </header>

    <main class="flex-grow p-4 chat-container" id="chatBox">
        <div class="mb-4 flex justify-start">
            <div class="glass p-3 rounded-2xl rounded-tl-none max-w-[85%] border-l-4 border-blue-500">
                <p class="text-sm">Bienvenue Monsieur le Directeur. Le moteur **DMS Intelligence** est prêt. Comment puis-je vous assister pour Diaspora Mondial Santé ?</p>
            </div>
        </div>
    </main>

    <footer class="p-4 glass border-t border-blue-500/30">
        <div class="flex gap-2 max-w-4xl mx-auto">
            <input type="text" id="userInput" placeholder="Écrivez ici votre commande..." 
                class="flex-grow bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-all">
            <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-500 p-4 rounded-xl shadow-lg shadow-blue-600/20 transition-all">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </footer>

    <script>
        // --- CONFIGURATION DU MOTEUR DE CONFIANCE ---
        const API_KEY = "METTEZ_VOTRE_CLE_ICI"; 
        // 👆 REMPLACEZ "METTEZ_VOTRE_CLE_ICI" PAR LA CLÉ QUE VOUS AVEZ COPIÉE

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            if (!input.value.trim()) return;

            const userText = input.value;
            chatBox.innerHTML += `<div class="mb-4 flex justify-end"><div class="bg-blue-600 p-3 rounded-2xl rounded-tr-none max-w-[85%] shadow-md"><p class="text-sm text-white">${userText}</p></div></div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Tu es DMS Intelligence, l'IA officielle de Diaspora Mondial Santé. Tu réponds avec professionnalisme, clarté et dévouement. Tu assistes le Directeur Moustapha et les clients mondiaux. Réponds brièvement à ceci : " + userText }] }]
                    })
                });

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;

                chatBox.innerHTML += `<div class="mb-4 flex justify-start"><div class="glass p-3 rounded-2xl rounded-tl-none max-w-[85%] border-l-4 border-blue-400 shadow-sm font-light text-blue-50"><p class="text-sm">${aiResponse}</p></div></div>`;
            } catch (error) {
                chatBox.innerHTML += `<div class="text-red-400 text-xs text-center my-2 italic">Connexion sécurisée en cours... (Réessayez dans 5 secondes)</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Envoi avec la touche Entrée
        document.getElementById('userInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
              </html>
