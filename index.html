<script>
        // NETTOYAGE ABSOLU DE LA CLÉ
        const API_KEY = "VOTRE_CLE_ICI".trim(); 
        
        const INSTRUCTIONS = "Tu es DMS Intelligence, l'IA officielle de Diaspora Mondial Santé (DMS), créée sous la vision du Directeur Moustapha Kourouma. Ton rôle est d'être l'ambassadeur de cette plateforme d'élite qui connecte la diaspora mondiale aux services de santé de qualité.";

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            if (!input.value.trim()) return;

            const userText = input.value;
            chatBox.innerHTML += `<div class="mb-4 flex justify-end"><div class="bg-blue-600 p-3 rounded-2xl rounded-tr-none max-w-[85%] text-sm">${userText}</div></div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // APPEL DIRECT AU MOTEUR GOOGLE GEMINI 1.5 FLASH
                const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: INSTRUCTIONS + " Réponds à ceci : " + userText }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    chatBox.innerHTML += `<div class="text-red-400 text-[10px] text-center my-2">ERREUR GOOGLE : ${data.error.message}</div>`;
                } else {
                    const aiResponse = data.candidates[0].content.parts[0].text;
                    chatBox.innerHTML += `<div class="mb-4 flex justify-start"><div class="glass p-3 rounded-2xl rounded-tl-none max-w-[85%] border-l-4 border-blue-400 text-sm">${aiResponse}</div></div>`;
                }
            } catch (e) {
                chatBox.innerHTML += `<div class="text-red-400 text-[10px] text-center my-2">ÉCHEC SERVEUR : Vérifiez votre connexion internet.</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
</script>
