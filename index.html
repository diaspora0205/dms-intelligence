<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIASPORA MONDIAL SANTÉ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-950 text-white font-sans min-h-screen flex flex-col">

    <header class="p-4 bg-slate-900 border-b-2 border-yellow-600 flex justify-between items-center shadow-2xl">
        <div class="flex items-center gap-2">
            <i class="fas fa-lion text-yellow-500 text-3xl"></i>
            <div>
                <h1 class="font-bold text-lg uppercase tracking-tighter text-yellow-500">DIASPORA MONDIAL SANTÉ</h1>
                <p class="text-[9px] text-gray-400 font-bold uppercase">Expertise & Pharmacopée Africaine</p>
            </div>
        </div>
        <div class="bg-green-600 text-white px-2 py-1 rounded text-[10px] font-bold animate-pulse">SANTÉ LIVE</div>
    </header>

    <div id="chat-box" class="flex-grow p-4 overflow-y-auto space-y-4" style="height: 75vh; background: url('https://www.transparenttextures.com/patterns/dark-matter.png');">
        <div class="bg-slate-800 p-4 rounded-2xl rounded-tl-none border border-slate-700 max-w-[90%] shadow-xl">
            <p class="text-sm font-bold text-yellow-500 mb-1">🦁 EXPERT DMS :</p>
            <p class="text-sm text-gray-200 leading-relaxed">
                Bonjour Monsieur le Directeur **Moustapha Kourouma**. Votre système est opérationnel. 
                Je suis l'IA de Diaspora Mondial Santé. Posez votre question sur une plante ou un traitement, je vous répondrai immédiatement.
            </p>
        </div>
    </div>

    <footer class="p-4 bg-slate-900 border-t border-yellow-600/30">
        <form id="chat-form" class="flex gap-2">
            <input type="text" id="user-input" placeholder="Demandez un conseil de santé..." class="flex-grow bg-black border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-yellow-500">
            <button type="submit" class="bg-yellow-600 w-14 h-14 rounded-xl flex items-center justify-center hover:bg-yellow-500 transition-all">
                <i class="fas fa-paper-plane text-xl"></i>
            </button>
        </form>
    </footer>

    <script>
        const form = document.getElementById('chat-form');
        const box = document.getElementById('chat-box');
        const input = document.getElementById('user-input');

        // L'IA QUI RÉPOND SANS INTERNET (100% GRATUIT)
        const reponses = {
            "bonsoir": "Bonsoir cher membre de la Diaspora. Comment puis-je vous aider pour votre santé aujourd'hui ?",
            "bonjour": "Bonjour. Diaspora Mondial Santé est à votre écoute. Que souhaitez-vous savoir ?",
            "paludisme": "Le paludisme demande une prise en charge rapide. La pharmacopée africaine propose l'Artemisia, mais consultez toujours un centre agréé DMS.",
            "plantes": "Nous répertorions plus de 500 plantes médicinales. Quelle plante vous intéresse ?",
            "dms": "Diaspora Mondial Santé est la vision du Directeur Kourouma pour unir la technologie et la médecine traditionnelle.",
            "aide": "Je peux vous conseiller sur les plantes, l'hygiène de vie et l'orientation médicale."
        };

        form.onsubmit = (e) => {
            e.preventDefault();
            const msg = input.value.trim().toLowerCase();
            if(!msg) return;

            // Message Utilisateur
            box.innerHTML += `<div class="flex justify-end mb-4"><div class="bg-yellow-700 p-4 rounded-2xl rounded-tr-none max-w-[85%] text-sm shadow-md font-medium">${input.value}</div></div>`;
            
            const loader = document.createElement('div');
            loader.className = "text-yellow-500 text-[10px] italic mb-4 animate-pulse uppercase font-bold";
            loader.innerText = "Le Lion analyse votre demande...";
            box.appendChild(loader);
            input.value = '';
            box.scrollTop = box.scrollHeight;

            setTimeout(() => {
                loader.remove();
                let r = "Votre demande a été enregistrée par l'expert DMS. Nous analysons la meilleure plante pour votre situation. Continuez à poser vos questions.";
                
                // Chercher si on a une réponse précise
                for(let cle in reponses) {
                    if(msg.includes(cle)) { r = reponses[cle]; break; }
                }

                box.innerHTML += `
                    <div class="flex justify-start mb-4">
                        <div class="bg-slate-800 p-4 rounded-2xl rounded-tl-none border-l-4 border-yellow-500 max-w-[85%] shadow-xl">
                            <p class="text-[10px] text-yellow-500 font-black mb-1 tracking-widest uppercase italic">Réponse Expert DMS</p>
                            <p class="text-sm text-gray-200 leading-relaxed font-light">${r}</p>
                        </div>
                    </div>`;
                box.scrollTop = box.scrollHeight;
            }, 1500);
        };
    </script>
</body>
</html>
