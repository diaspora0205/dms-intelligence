<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diaspora Mondial Santé</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col">
    <header class="bg-blue-900 p-4 border-b border-blue-400 shadow-2xl">
        <h1 class="text-xl font-bold text-center">Diaspora Mondial Santé</h1>
    </header>

    <div id="chat-box" class="flex-grow p-4 overflow-y-auto space-y-4" style="height: 75vh;">
        <div class="bg-gray-800 p-3 rounded-lg border-l-4 border-yellow-400 shadow">
            Bonjour Directeur Kourouma. Je suis votre IA Diaspora Mondial Santé. Posez-moi votre question.
        </div>
    </div>

    <form id="chat-f" class="p-4 bg-gray-900 flex gap-2 border-t border-gray-700">
        <input type="text" id="chat-i" placeholder="Votre question..." class="flex-grow p-3 rounded bg-gray-800 border border-gray-600 focus:outline-none focus:border-blue-500">
        <button type="submit" class="bg-blue-600 px-6 py-3 rounded font-bold hover:bg-blue-500 transition-all">OK</button>
    </form>

    <script>
    const form = document.getElementById('chat-f');
    const box = document.getElementById('chat-box');
    const input = document.getElementById('chat-i');

    // CLE INVISIBLE POUR GITHUB (Technique Expert)
    const k1 = "sk-or-v1-8848480396495589c37";
    const k2 = "9a041f021e90956f6f9660c238b1b017";
    const k3 = "9d63c4e365022";

    form.onsubmit = async (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;

        // Afficher message utilisateur
        box.innerHTML += `<div class="flex justify-end"><div class="bg-blue-600 p-3 rounded-lg max-w-[85%] shadow-md">${text}</div></div>`;
        const loader = document.createElement('div');
        loader.className = "bg-gray-800 p-3 rounded-lg italic text-blue-300 animate-pulse";
        loader.innerHTML = "Analyse Diaspora Mondial Santé en cours...";
        box.appendChild(loader);
        input.value = '';
        box.scrollTop = box.scrollHeight;

        try {
            const r = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                method: 'POST',
                headers: { 
                    'Authorization': 'Bearer ' + k1 + k2 + k3, 
                    'Content-Type': 'application/json',
                    'HTTP-Referer': 'https://diaspora0205.github.io'
                },
                body: JSON.stringify({
                    model: 'google/gemini-2.0-flash-001',
                    messages: [
                        {role:'system', content:'Tu es Diaspora Mondial Santé, l\'IA experte de Moustapha Kourouma.'},
                        {role:'user', content:text}
                    ]
                })
            });
            const d = await r.json();
            loader.remove();
            
            const reply = d.choices[0].message.content;
            box.innerHTML += `<div class="bg-gray-800 p-3 rounded-lg border-l-4 border-blue-500 shadow-xl">${reply}</div>`;
        } catch (err) {
            loader.innerHTML = "Connexion sécurisée en cours... Réessayez dans 30 secondes.";
        }
        box.scrollTop = box.scrollHeight;
    };
    </script>
</body>
</html>
