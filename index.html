</div>

<script>

const db = [

    {k:["morue","perte","infection"], fr:"SOLUTION : Décoction de racines antibiotiques et hygiène purifiante.", en:"CARE: Antibiotic roots and purifying hygiene."},

    {k:["asthme","bronchite"], fr:"SOLUTION : Sirop naturel Oignon rouge, Miel pur et Ail.", en:"CARE: Red Onion, Honey and Garlic syrup."},

function setL(l){ L=l; document.getElementById('uIn').placeholder=(L=='fr'?'Écrivez ici...':'Write here...'); }

function run() {
    let v = document.getElementById('uIn').value.toLowerCase().trim();
    let res = document.getElementById('res');
    if(v.length < 2) return;
    let found = false;
    for(let i of db){
        for(let key of i.k){
            if(v.includes(key)){
                res.innerHTML="<b style='color:#050a14;'>RÉPONSE DMS :</b><br><br>"+i[L];
                found = true; break;
            }
        }
    }
    if(!found) res.innerHTML="<b>ALERTE DMS :</b> Maladie non reconnue. Contactez le Directeur sur WhatsApp.";
    res.style.display="block";
    document.getElementById('wel').style.display="none";
    document.getElementById('uIn').value="";
}
