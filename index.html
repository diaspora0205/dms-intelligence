<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMS IA - MOUSTAPHA KOUROUMA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffb703; --dark: #050a12; --blue: #219ebc; --med: #023e8a; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding-bottom: 180px; }
        .header { background: var(--blue); padding: 15px; text-align: center; border-bottom: 5px solid var(--gold); }
        .title { color: var(--gold); font-size: 18px; font-weight: bold; margin: 0; text-transform: uppercase; }
        .slogan { color: white; font-size: 14px; font-weight: bold; margin: 5px 0; text-transform: uppercase; }
        .director { background: var(--gold); color: black; font-size: 12px; font-weight: bold; padding: 6px 15px; display: inline-block; margin-top: 5px; border-radius: 4px; }
        .card { background: white; color: black; margin: 15px; padding: 25px; border-radius: 15px; border-left: 10px solid var(--gold); }
        #res { background: #f0f7ff; color: var(--med); padding: 18px; border-radius: 10px; margin-top: 15px; display: none; font-weight: bold; border: 2px solid var(--blue); line-height: 1.6; font-size: 16px; }
        .footer-fixed { position: fixed; bottom: 0; width: 100%; background: var(--dark); border-top: 3px solid var(--gold); z-index: 1000; }
        .input-box { display: flex; gap: 8px; padding: 15px; background: #1a1a1a; }
        input { flex: 1; padding: 18px; border-radius: 10px; border: 2px solid var(--gold); font-size: 16px; outline: none; font-weight: bold; color: black; }
        .btn-send { background: var(--gold); border: none; padding: 0 20px; border-radius: 10px; color: black; cursor: pointer; }
        .wa-btn { background: #25d366; color: white; text-align: center; padding: 18px; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body onload="startSystem()">

    <div class="header">
        <p class="title">DIASPORA MONDIAL SANTÉ (DMS)</p>
        <p class="slogan">MÉDECINE TRADITIONNELLE INTÉGRÉE IL Y A</p>
        <span class="director">INITIATEUR : MOUSTAPHA KOUROUMA</span>
        <div id="google_translate_element"></div>
    </div>

    <div class="card">
        <h3><i class="fas fa-hand-holding-medical"></i> ANALYSEUR DMS</h3>
        <p id="wel">Entrez votre problème (Ventre, Impuissance, Diabète, Tension...)</p>
        <div id="res"></div>
    </div>

    <div class="footer-fixed">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Quelle est la maladie ?">
            <button class="btn-send" onclick="ask()"><i class="fas fa-paper-plane fa-2x"></i></button>
        </div>
        <a href="https://wa.me/2207814179" class="wa-btn">
            <i class="fab fa-whatsapp fa-2x"></i> VOCAL AU DIRECTEUR DMS
        </a>
    </div>

    <script>
        function startSystem() {
            console.log("DMS Système Activé");
        }

        const data = [
            { k: ["ventre", "estomac", "gaz", "ballon", "digestion", "maux"], r: "SOLUTION DMS : Infusion de Gingembre frais ou Charbon végétal. Évitez les repas lourds et le piment." },
            { k: ["impuissance", "sexe", "faiblesse", "erection", "garcon", "homme", "performance"], r: "SOLUTION DMS : Mélange de Petit Cola, Gingembre et Miel pur. Prenez une petite quantité 30 min avant. ATTENTION : Interdit si vous avez de la tension." },
            { k: ["diabete", "sucre", "glycemie", "taux"], r: "SOLUTION DMS : Utilisez les feuilles de Neem (Djiriblani) en infusion ou la poudre de Cannelle. Supprimez tout sucre et pain blanc." },
            { k: ["tension", "hyper", "coeur", "palpitation"], r: "SOLUTION DMS : Infusion d'Hibiscus (Bissap) tiède sans sucre. Zéro sel dans la nourriture. Repos total." },
            { k: ["hemorroide", "hemorique", "saigne", "fesse", "anus"], r: "SOLUTION DMS : Bain de siège à l'eau froide matin et soir. Décoction d'écorce de manguier. Mangez beaucoup de Papaye." },
            { k: ["palu", "fievre", "chaud", "paludisme", "corps"], r: "SOLUTION DMS : Infusion d'Artémisia ou de feuilles de Neem. Boire beaucoup d'eau et rester au frais." },
            { k: ["toux", "rhume", "grippe", "gorge", "poitrine", "rhume"], r: "SOLUTION DMS : Décoction chaude de Miel, Citron et Ail écrasé. À prendre 3 fois par jour." },
            { k: ["nerfs", "stress", "insomnie", "sommeil", "pense"], r: "SOLUTION DMS : Infusion de Citronnelle ou de Verveine. Évitez le téléphone et le café le soir." },
            { k: ["fatigue", "astenie", "faible"], r: "SOLUTION DMS : Cure de Moringa (poudre ou feuilles) pendant 10 jours. Riche en vitamines." },
            { k: ["foie", "hepatite", "jaunisse"], r: "SOLUTION DMS : Cure de Desmodium. Arrêtez l'alcool, le tabac et les graisses." }
        ];

        function ask() {
            let inputField = document.getElementById('userInput');
            let input = inputField.value.toLowerCase().trim();
            let out = document.getElementById('res');
            let wel = document.getElementById('wel');
            
            if(input.length < 2) return;
            
            let found = false;
            // Boucle de recherche intelligente
            for(let item of data){
                for(let key of item.k){
                    if(input.indexOf(key) !== -1){ 
                        out.innerHTML = "<b>ANALYSE DMS RÉUSSIE :</b><br><br>" + item.r;
                        found = true; break;
                    }
                }
                if(found) break;
            }
            
            if(!found) {
                out.innerHTML = "<b>ANALYSE DMS :</b> Ce cas nécessite l'expertise directe du Directeur. Cliquez sur le bouton WhatsApp ci-dessous pour lui envoyer un VOCAL.";
            }
            
            out.style.display = "block";
            wel.style.display = "none";
            inputField.value = ""; // Vide le clavier
        }

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'fr',
                includedLanguages: 'en,ar,pt,es,de,zh-CN,ru,it,fr',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
            </html>
