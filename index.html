<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMS IA - MOUSTAPHA KOUROUMA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffb703; --dark: #050a12; --blue: #219ebc; --med: #023e8a; }
        body { background: var(--dark); color: white; font-family: 'Arial', sans-serif; margin: 0; padding-bottom: 180px; }
        
        .header { background: var(--blue); padding: 15px; text-align: center; border-bottom: 5px solid var(--gold); }
        .title { color: var(--gold); font-size: 18px; font-weight: bold; margin: 0; text-transform: uppercase; }
        /* Votre phrase exacte ici */
        .slogan { color: white; font-size: 15px; font-weight: bold; margin: 8px 0; text-transform: uppercase; background: rgba(0,0,0,0.2); padding: 5px; display: inline-block; width: 100%; }
        .director { background: var(--gold); color: black; font-size: 13px; font-weight: bold; padding: 6px 15px; display: inline-block; margin-top: 5px; border-radius: 4px; }

        #datetime { font-size: 12px; margin: 10px 0; color: #fff; }
        #google_translate_element { margin-top: 10px; }

        .card { background: white; color: black; margin: 15px; padding: 25px; border-radius: 15px; border-left: 10px solid var(--gold); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        #res { background: #f0f7ff; color: var(--med); padding: 18px; border-radius: 10px; margin-top: 15px; display: none; font-weight: bold; border: 2px solid var(--blue); line-height: 1.6; font-size: 16px; }
        
        .footer-fixed { position: fixed; bottom: 0; width: 100%; background: var(--dark); border-top: 3px solid var(--gold); z-index: 1000; }
        .input-box { display: flex; gap: 8px; padding: 15px; background: #1a1a1a; }
        input { flex: 1; padding: 18px; border-radius: 10px; border: 2px solid var(--gold); font-size: 16px; outline: none; font-weight: bold; }
        .btn-send { background: var(--gold); border: none; padding: 0 20px; border-radius: 10px; color: black; cursor: pointer; }
        .wa-btn { background: #25d366; color: white; text-align: center; padding: 18px; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .counter-img { height: 45px; margin-top: 5px; }
    </style>
</head>
<body onload="startSystem()">

    <div class="header">
        <p class="title">DIASPORA MONDIAL SANTÉ (DMS)</p>
        <p class="slogan">MÉDECINE TRADITIONNELLE INTÉGRÉE IL Y A</p>
        <span class="director">INITIATEUR : MOUSTAPHA KOUROUMA</span>
        <div id="datetime">CHARGEMENT...</div>
        <div id="google_translate_element"></div>
    </div>

    <div class="card">
        <h3><i class="fas fa-robot"></i> ANALYSEUR IA DMS</h3>
        <p id="wel">Écrivez une maladie pour recevoir la solution (Ventre, Tension, Diabète, etc.)</p>
        <div id="res"></div>
    </div>

    <div style="text-align:center; padding:10px;">
        <p style="font-size:11px; color:var(--gold); margin:0;">AUDIENCE MONDIALE</p>
        <img src="https://profile-counter.glitch.me/diaspora-mondial-sante/count.svg" class="counter-img">
    </div>

    <div class="footer-fixed">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Quelle est la maladie ?">
            <button class="btn-send" onclick="ask()"><i class="fas fa-paper-plane fa-2x"></i></button>
        </div>
        <a href="https://wa.me/2207814179" class="wa-btn">
            <i class="fab fa-whatsapp fa-2x"></i> VOCAL AU DIRECTEUR DMS
        </a>
    </div>

    <script>
        function startSystem() { updateTime(); setInterval(updateTime, 1000); }
        function updateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('datetime').innerHTML = now.toLocaleDateString('fr-FR', options).toUpperCase();
        }

        const data = [
            { k: ["ventre", "estomac", "gaz", "ballon", "digestion", "mal au ventre"], r: "SOLUTION DMS : Infusion de Gingembre frais ou Charbon végétal. Évitez le piment." },
            { k: ["hemorroide", "hemorique", "saigne", "anus", "fesse"], r: "SOLUTION DMS : Bain de siège froid. Décoction d'écorce de manguier. Consommez de la Papaye." },
            { k: ["tension", "hyper", "coeur", "palpitation"], r: "SOLUTION DMS : Infusion d'Hibiscus (Bissap) sans sucre. Zéro sel. Repos total." },
            { k: ["diabete", "sucre", "glycemie"], r: "SOLUTION DMS : Feuilles de Neem ou poudre de Cannelle. Supprimez le sucre industriel." },
            { k: ["sexe", "faiblesse", "impuissance", "erection"], r: "SOLUTION DMS : Petit Cola et Gingembre. ATTENTION : Interdit aux hypertendus." },
            { k: ["palu", "fievre", "chaud", "paludisme"], r: "SOLUTION DMS : Artémisia ou feuilles de Neem en infusion. Buvez beaucoup d'eau." },
            { k: ["toux", "rhume", "grippe", "gorge"], r: "SOLUTION DMS : Mélange Miel, Citron et Ail dans l'eau tiède." },
            { k: ["nerfs", "stress", "insomnie"], r: "SOLUTION DMS : Infusion de Citronnelle ou Verveine. Calme et repos." },
            { k: ["fatigue", "corps"], r: "SOLUTION DMS : Cure de Moringa (poudre) pendant 7 jours." },
            { k: ["peau", "bouton", "dartre"], r: "SOLUTION DMS : Huile de Neem ou beurre de Karité pur." }
        ];

        function ask() {
            let inputField = document.getElementById('userInput');
            let input = inputField.value.toLowerCase();
            let out = document.getElementById('res');
            let wel = document.getElementById('wel');
            if(input.length < 2) return;
            let found = false;
            for(let item of data){
                for(let key of item.k){
                    if(input.includes(key)){
                        out.innerHTML = "<b>ANALYSE DMS :</b><br><br>" + item.r;
                        found = true; break;
                    }
                }
            }
            if(!found) { out.innerHTML = "<b>NOTE DMS :</b> Cas complexe. Envoyez un VOCAL au Directeur Moustapha Kourouma pour une solution personnalisée."; }
            out.style.display = "block"; wel.style.display = "none";
            inputField.value = ""; 
        }

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'fr',
                includedLanguages: 'en,ar,pt,es,de,zh-CN,ru,it,fr',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
