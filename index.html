<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMS IA - EXPERTISE MOUSTAPHA KOUROUMA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffb703; --dark: #050a12; --blue: #219ebc; --white: #ffffff; }
        body { background: var(--dark); color: var(--white); font-family: 'Arial', sans-serif; margin: 0; padding-bottom: 250px; text-align: center; }
        
        .header { background: var(--blue); padding: 15px; border-bottom: 5px solid var(--gold); }
        .title { color: var(--gold); font-size: 18px; font-weight: bold; margin: 0; text-transform: uppercase; }
        .director { background: var(--gold); color: black; font-size: 12px; font-weight: bold; padding: 5px 15px; display: inline-block; margin-top: 5px; border-radius: 4px; }
        
        #datetime { background: #003049; color: var(--gold); padding: 10px; font-weight: bold; font-size: 13px; border-bottom: 2px solid var(--gold); }

        /* ZONE TRADUCTION GOOGLE */
        #google_translate_element { background: white; padding: 5px; margin: 10px auto; width: 95%; border-radius: 5px; min-height: 40px; }

        .card { background: var(--white); color: #333; margin: 15px; padding: 25px; border-radius: 15px; border-left: 10px solid var(--gold); box-shadow: 0 10px 20px rgba(0,0,0,0.5); text-align: left; }
        #res { background: #eef6ff; color: #023e8a; padding: 18px; border-radius: 12px; margin-top: 15px; display: none; font-weight: bold; border: 2px solid var(--blue); font-size: 16px; }
        
        /* COMPTEUR RÉPARÉ */
        .counter-section { margin: 20px 0; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; border: 1px dashed var(--gold); }

        .footer-fixed { position: fixed; bottom: 0; width: 100%; background: var(--dark); border-top: 3px solid var(--gold); z-index: 1000; }
        .input-box { display: flex; gap: 8px; padding: 12px; background: #111; }
        input { flex: 1; padding: 15px; border-radius: 8px; border: 2px solid var(--gold); font-size: 16px; font-weight: bold; outline: none; color: black; }
        .btn-send { background: var(--gold); border: none; padding: 0 20px; border-radius: 8px; color: black; cursor: pointer; }
        .wa-btn { background: #25d366; color: white; text-align: center; padding: 15px; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 15px; }
    </style>
</head>
<body onload="startDMS()">

    <div class="header">
        <p class="title">DIASPORA MONDIAL SANTÉ (DMS)</p>
        <p style="font-size: 12px; font-weight: bold; margin: 5px 0;">MÉDECINE TRADITIONNELLE INTÉGRÉE IL Y A</p>
        <span class="director">INITIATEUR : MOUSTAPHA KOUROUMA</span>
    </div>

    <div id="datetime">CHARGEMENT...</div>

    <div id="google_translate_element"></div>

    <div class="card">
        <h3><i class="fas fa-microchip"></i> RECHERCHE DMS</h3>
        <p id="wel">Entrez une maladie (Ex: Diabète, Impuissance, Estomac...)</p>
        <div id="res"></div>
    </div>

    <div class="counter-section">
        <p style="color:var(--gold); font-size:11px; margin-bottom:10px; font-weight:bold;">TRAÇABILITÉ D'AUDIENCE MONDIALE DMS</p>
        <img src="https://profile-counter.glitch.me/diaspora-mondial-sante/count.svg" alt="Compteur DMS">
    </div>

    <div class="footer-fixed">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Quelle est la maladie ?">
            <button class="btn-send" onclick="ask()"><i class="fas fa-paper-plane fa-2x"></i></button>
        </div>
        <a href="https://wa.me/2207814179" class="wa-btn">
            <i class="fab fa-whatsapp fa-2x"></i> VOCAL AU DIRECTEUR DMS
        </a>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'fr', 
                includedLanguages: 'en,ar,es,pt,de,zh-CN,it,hi,fr'
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        function startDMS() { updateClock(); setInterval(updateClock, 1000); }
        function updateClock() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('datetime').innerHTML = now.toLocaleDateString('fr-FR', options).toUpperCase();
        }

        const database = [
            { k: ["diabete", "sucre", "glycemie"], r: "DMS : Infusion de feuilles de Neem ou Cannelle. Supprimez sucre et pain blanc." },
            { k: ["estomac", "ulcere", "gastrite", "brulure", "ventre"], r: "DMS : Jus de pomme de terre crue à jeun ou infusion de Gingembre frais." },
            { k: ["impuissance", "sexe", "faiblesse", "erection", "performance", "garcon"], r: "DMS : Petit Cola, Gingembre et Miel. (Interdit si hypertension)." },
            { k: ["tension", "hyper", "coeur", "palpitation"], r: "DMS : Infusion d'Hibiscus (Bissap) tiède sans sucre. Zéro sel." },
            { k: ["hemorroide", "saigne", "anus", "fesse"], r: "DMS : Bain de siège froid. Décoction d'écorce de manguier." },
            { k: ["palu", "fievre", "paludisme", "chaud"], r: "DMS : Infusion d'Artémisia ou feuilles de Neem. Hydratation." },
            { k: ["toux", "rhume", "grippe", "gorge"], r: "DMS : Sirop de Miel, Citron et Ail écrasé." },
            { k: ["nerf", "stress", "insomnie", "sommeil"], r: "DMS : Infusion de Citronnelle ou Verveine. Repos." },
            { k: ["fatigue", "corps", "faible"], r: "DMS : Cure de Moringa (poudre) pendant 10 jours." },
            { k: ["foie", "hepatite", "jaunisse"], r: "DMS : Cure de Desmodium. Arrêtez l'alcool." },
            { k: ["rein", "calcul", "urine"], r: "DMS : Buvez 3L d'eau. Infusion de racine de Persil." },
            { k: ["asthme", "respiration", "souffle"], r: "DMS : Infusion de Thym et Miel." },
            { k: ["dos", "rhumatisme", "articulation"], r: "DMS : Massage au beurre de Karité pur." },
            { k: ["peau", "bouton", "dartre"], r: "DMS : Huile de Neem ou Gel d'Aloe Vera." },
            { k: ["anemie", "sang", "fer"], r: "DMS : Jus de Betterave et Moringa." },
            { k: ["regles", "douleur", "femme"], r: "DMS : Infusion chaude de Menthe ou Gingembre." },
            { k: ["poids", "grossir", "appetit"], r: "DMS : Sirop de Fenugrec." },
            { k: ["maigrir", "graisse", "poids"], r: "DMS : Eau citronnée tiède le matin." },
            { k: ["memoire", "cerveau"], r: "DMS : Consommez des Noix et cure de Ginkgo." },
            { k: ["dents", "gencive", "bouche"], r: "DMS : Bain de bouche salé ou clou de Girofle." },
            { k: ["yeux", "vision", "vue"], r: "DMS : Cure de Vitamine A (Carottes)." },
            { k: ["sinusite", "nez", "rhume"], r: "DMS : Inhalation de vapeur d'Eucalyptus." },
            { k: ["cholesterol", "graisse sang"], r: "DMS : Ail frais et infusion de feuilles d'Olivier." },
            { k: ["vers", "parasite", "ventre"], r: "DMS : Graines de Courge ou Ail à jeun." },
            { k: ["prostate", "urine homme"], r: "DMS : Graines de courge et racine d'Ortie." },
            { k: ["thyroide"], r: "DMS : Consommez des algues marines." },
            { k: ["tension basse", "hypotension"], r: "DMS : Hydratation salée et Romarin." },
            { k: ["brulure"], r: "DMS : Gel d'Aloe Vera ou Miel pur." },
            { k: ["plaie", "cicatrice"], r: "DMS : Infusion de Neem et Miel." },
            { k: ["gaz", "ballonnement"], r: "DMS : Charbon végétal ou infusion de Thym." }
        ];

        function ask() {
            let inputField = document.getElementById('userInput');
            let input = inputField.value.toLowerCase().trim();
            let out = document.getElementById('res');
            let wel = document.getElementById('wel');
            if(input.length < 2) return;
            
            let found = false;
            for(let item of database){
                for(let key of item.k){
                    if(input.includes(key)){
                        out.innerHTML = "<span style='color:#ffb703'>ANALYSE DMS :</span><br><br>" + item.r;
                        found = true; break;
                    }
                }
                if(found) break;
            }

            if(!found) {
                out.innerHTML = "<span style='color:red'>ANALYSE DMS :</span> Cas spécifique. Envoyez un vocal WhatsApp au Directeur.";
            }
            out.style.display = "block";
            wel.style.display = "none";
            inputField.value = ""; // Efface le texte après envoi
        }
    </script>
</body>
</html>
