<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMS - Expert Google Cloud Top 24</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Arial', sans-serif; background: #f0f2f5; margin: 0; padding: 0; color: #333; }
        .header { background: #004d40; color: white; padding: 25px 10px; text-align: center; border-bottom: 6px solid #ffcc00; }
        
        /* Badges Style Expert */
        .badges-container { margin: 15px 0; }
        .badge-line { background: #ffcc00; color: #000; font-weight: bold; padding: 8px 20px; border-radius: 25px; display: inline-block; margin: 5px; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .badge-gold { background: white; border: 3px solid #ffcc00; color: #004d40; width: 90%; max-width: 400px; }

        /* Moteur de Diagnostic */
        .main-card { background: white; width: 90%; max-width: 500px; margin: 20px auto; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .search-area { position: relative; margin-top: 20px; }
        .input-field { width: 100%; padding: 15px 50px 15px 20px; border-radius: 30px; border: 2px solid #004d40; font-size: 16px; box-sizing: border-box; }
        .send-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: #ffcc00; color: #004d40; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }

        /* Zone de Réponse Nettoyée */
        #resultat { margin-top: 20px; padding: 15px; border-radius: 12px; background: #e8f5e9; border-left: 6px solid #2e7d32; display: none; text-align: left; line-height: 1.5; }

        /* Gadgets */
        .info-bar { background: #222; color: white; padding: 10px; font-size: 13px; display: flex; justify-content: space-around; }
        .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 12px 20px; border-radius: 30px; text-decoration: none; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 100; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">DIASPORA MONDIAL SANTÉ (DMS)</h2>
    <p style="margin:5px 0;">Directeur : <strong>Mustapha Kourouma</strong></p>
    <div class="badges-container">
        <div class="badge-line">🥉 Bronze: 2e Place</div>
        <div class="badge-line">🥈 Argent: 3e Place</div><br>
        <div class="badge-line badge-gold">🥇 Or: 24e Mondial (Google Cloud Expert)</div>
    </div>
</div>

<div class="info-bar">
    <span id="date-time"></span>
    <span>Visiteurs : <strong id="v-count">2514</strong></span>
</div>

<div id="google_translate_element" style="margin:10px;"></div>

<div class="main-card">
    <h3 style="color:#004d40;">IA de Diagnostic Intégrée</h3>
    <p style="font-size:14px; color:#666;">Entrez vos symptômes pour une solution claire et nette.</p>
    
    <div class="search-area">
        <input type="text" id="userInput" class="input-field" placeholder="Ex: Diabète, Tension, Palu...">
        <button class="send-icon" onclick="analyser()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <div id="resultat"></div>
</div>

<a href="https://wa.me/220XXXXXXXX" class="whatsapp-float">
    <i class="fab fa-whatsapp"></i> WhatsApp Directeur
</a>

<script>
    // Horloge
    function startClock() {
        const d = new Date();
        document.getElementById('date-time').innerHTML = d.toLocaleDateString() + " " + d.toLocaleTimeString();
    }
    setInterval(startClock, 1000);

    // Compteur Visiteurs
    let visitors = 2514;
    setInterval(() => {
        visitors += Math.floor(Math.random() * 2);
        document.getElementById('v-count').innerText = visitors;
    }, 8000);

    // Moteur de Solutions
    const db = {
        "diabete": "<b>SOLUTION DMS :</b> Utilisation de la plante <i>Moringa Oleifera</i> en infusion matin et soir + racines de pays 1. Réduit le taux de sucre naturellement. Suivi IA : Recommandé.",
        "tension": "<b>SOLUTION DMS :</b> Décoction d'Hibiscus (Bissap) tiède et ail frais. Éviter le sel. L'IA de l'Expert Google conseille un repos de 20 min après la prise.",
        "paludisme": "<b>SOLUTION DMS :</b> Tisane d'Artémisia ou feuilles de Neem bouillies. Traitement traditionnel efficace en complément d'une hydratation forte.",
        "grippe": "<b>SOLUTION DMS :</b> Gingembre, citron et miel dans de l'eau chaude. Renforce le système immunitaire instantanément."
    };

    function analyser() {
        const val = document.getElementById('userInput').value.toLowerCase();
        const res = document.getElementById('resultat');
        res.style.display = "block";
        res.innerHTML = "<i>Analyse de l'Expert Google en cours...</i>";

        setTimeout(() => {
            let match = "";
            for (let key in db) {
                if (val.includes(key)) { match = db[key]; break; }
            }
            
            if (match) {
                res.innerHTML = match + "<br><br><small>✅ Validé par Mustapha Kourouma (Top 24 Mondial)</small>";
            } else {
                res.innerHTML = "<b>ANALYSE IA :</b> Pathologie non répertoriée ou complexe. <br>👉 Cliquez sur le bouton WhatsApp pour parler directement au Directeur Mustapha.";
            }
        }, 1200);
    }

    function googleTranslateElementInit() {
        new google.translate.TranslateElement({pageLanguage: 'fr'}, 'google_translate_element');
    }
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
