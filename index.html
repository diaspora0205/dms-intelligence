<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMS Intelligence - Chat IA</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #2c3e50; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 10px; }
        .bot { align-self: flex-start; background: #ddd; }
        .user { align-self: flex-end; background: #3498db; color: white; }
        .input-area { background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #27ae60; color: white; border: none; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="header">🦁 DMS Intelligence - Chat IA</div>
    <div id="chat">
        <div class="msg bot">Bonjour ! Comment puis-je vous aider ?</div>
    </div>
    <div class="input-area">
        <input type="text" id="text" placeholder="Ecrivez ici...">
        <button onclick="send()">Envoyer</button>
    </div>
    <script>
        function send() {
            let i = document.getElementById('text');
            let c = document.getElementById('chat');
            if(!i.value) return;
            c.innerHTML += `<div class="msg user">${i.value}</div>`;
            setTimeout(() => {
                c.innerHTML += `<div class="msg bot">Connexion au moteur Google...</div>`;
            }, 500);
            i.value = "";
        }
    </script>
</body>
</html>
