<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMS IA - MOUSTAPHA KOUROUMA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffb703; --dark: #050a12; --blue: #219ebc; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding-bottom: 150px; }
        
        /* Header & Traducteur */
        .header { background: var(--blue); padding: 20px; text-align: center; border-bottom: 4px solid var(--gold); }
        .title { color: var(--gold); font-size: 22px; font-weight: bold; margin: 0; text-transform: uppercase; }
        
        /* Cartes de contenu */
        .card { background: white; color: black; margin: 15px; padding: 20px; border-radius: 15px; border-left: 10px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .dashboard { background: rgba(255,255,255,0.1); margin: 15px; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid var(--gold); }
        
        /* Résultat IA */
        #res { background: #f0f0f0; color: #d00; padding: 15px; border-radius: 10px; margin-top: 15px; display: none; font-weight: bold; border-left: 5px solid var(--blue); }
        
        /* Section Compteur (Puissance) */
        .stats-box { background: white; color: black; margin: 20px 15px; padding: 20px; border-radius: 15px; text-align: center; }
        .counter-img { height: 50px; margin: 10px 0; border: 2px solid var(--blue); border-radius: 5px; }

        /* Footer Fixe (Boutons) */
        .footer-fixed { position: fixed; bottom: 0; width: 100%; background: var(--dark); border-top: 2px solid var(--gold); z-index: 1000; }
        .input-box { display: flex; gap: 8px; padding: 15px; }
        input { flex: 1; padding: 15px; border-radius: 10px; border: 2px solid var(--gold); font-size: 16px; }
        .btn-send { background: var(--gold); border: none; padding: 15px; border-radius: 10px; color: white; cursor: pointer; }
        .wa-btn { background: #25d366; color: white; text-align: center; padding: 12px; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; }
    </style>
</head>
<body onload="initDMS()">

    <div class="header">
        <p class="title">DIASPORA MONDIAL SANTÉ (DMS)</p>
        <p style="margin: 5px 0; font-size: 12px;">DIRECTEUR : MOUSTAPHA KOUROUMA</p>
        <div id="google_translate_element"></div>
    </div>

    <div class="card">
        <h3 style="margin-top:0; color: var(--blue);">ANALYSEUR IA DMS</h3>
        <p id="wel">Bonjour. Décrivez vos symptômes ou une plante pour analyse.</p>
        <div id="res"></div>
    </div>

    <div class="dashboard">
        <p style="color: var(--gold); font-weight: bold; margin: 0; letter-spacing: 1px;">🌍 DMS WORLDWIDE : 9 LANGUAGES SYSTEM</p>
    </div>

    <div class="stats-box">
        <p style="font-size: 13px; font-weight: bold; color: #555; text-transform: uppercase;">Traçabilité de l'Audience Mondiale</p>
        <img src="https://profile-counter.glitch.me/diaspora-mondial-sante/count.svg" alt="Compteur" class="counter-img">
        <p style="font-size: 11px; color: #888; margin: 0;">Consultations enregistrées en temps réel</p>
    </div>

    <div class="footer-fixed">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Quelle est votre maladie ?">
            <button class="btn-send" onclick="ask()"><i class="fas fa-paper-plane fa-lg"></i></button>
        </div>
        <a href="https://wa.me/2207814179" class="wa-btn">
            <i class="fab fa-whatsapp fa-2x"></i> ENVOYER UN VOCAL AU DIRECTEUR
        </a>
    </div>

    <script>
        const data = [
            { k: ["palu", "fievre", "moustique"], r: "DMS : Risque de Paludisme. Prenez du paracétamol. Consultez si la fièvre persiste." },
            { k: ["impuissance", "sexe", "faiblesse"], r: "DMS : Utilisez Gingembre ou Petit Cola. ATTENTION : Interdit aux hypertendus." },
            { k: ["diabete", "sucre"], r: "DMS : Réduire le sucre immédiatement. Plantes : Neem ou Cannelle. Suivi médical obligatoire." },
            { k: ["tete", "migraine"], r: "DMS : Repos et hydratation. Infusion de menthe. Si vision trouble, consultez urgemment." },
            { k: ["estomac", "ventre", "gaz"], r: "DMS : Infusion de Gingembre. Évitez les repas lourds le soir." }
        ];

        function initDMS() { console.log("Moteur DMS 100% Opérationnel"); }

        function ask() {
            let input = document.getElementById('userInput').value.toLowerCase();
            let out = document.getElementById('res');
            let wel = document.getElementById('wel');
            if(input.length < 2) return;
            let found = false;
            for(let item of data){
                for(let key of item.k){
                    if(input.includes(key)){
                        out.innerHTML = "RÉSULTAT ANALYSE DMS :<br><br>" + item.r;
                        found = true; break;
                    }
                }
            }
            if(!found) out.innerHTML = "ALERTE : Information non trouvée. Contactez le Directeur par vocal pour une analyse spécifique.";
            out.style.display = "block";
            wel.style.display = "none";
        }

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'fr',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
